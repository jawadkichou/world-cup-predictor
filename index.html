<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>World Cup Bracket Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #171a21;
      --surface3: #1e2230;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e4eaf5;
      --muted: #6b7a94;
      --muted2: #8e9ab5;
      --green: #00e87a;
      --green-dim: rgba(0,232,122,0.12);
      --blue: #4da6ff;
      --blue-dim: rgba(77,166,255,0.12);
      --red: #ff5568;
      --red-dim: rgba(255,85,104,0.12);
      --amber: #ffb84d;
      --amber-dim: rgba(255,184,77,0.12);
      --r: 6px; --r-lg: 10px; --r-xl: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; line-height: 1.5; min-height: 100vh; }
    .app { max-width: 1280px; margin: 0 auto; padding: 16px 16px 48px; }
 
    header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border2); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
    .brand-text h1 { font-family: 'Syne', sans-serif; font-size: clamp(16px,2vw,22px); font-weight: 800; letter-spacing: -0.3px; color: #fff; }
    .brand-text p { color: var(--muted2); font-size: 12px; margin-top: 1px; }
 
    .tabs { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
    .tab { padding: 6px 14px; border-radius: 7px; background: transparent; color: var(--muted2); cursor: pointer; border: none; font-family: inherit; font-size: 12px; font-weight: 500; transition: all 140ms ease; white-space: nowrap; }
    .tab:hover { color: var(--text); background: var(--surface2); }
    .tab.active { background: var(--surface3); color: #fff; border: 1px solid var(--border2); }
 
    .panel { display: none; }
    .panel.visible { display: block; }
 
    .section-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .section-header-left { display: flex; align-items: center; gap: 8px; }
    .section-header h2 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; }
    .section-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,232,122,0.2); letter-spacing: 0.04em; text-transform: uppercase; }
 
    .matches-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .matches-controls-label { font-size: 11px; color: var(--muted); font-weight: 500; }
    .ctrl-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted2); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; transition: all 130ms ease; white-space: nowrap; }
    .ctrl-btn:hover { background: var(--surface3); color: var(--text); }
    .ctrl-btn.active { background: var(--green-dim); color: var(--green); border-color: rgba(0,232,122,0.3); }
    .ctrl-btn.danger { color: var(--red); border-color: rgba(255,85,104,0.25); }
    .ctrl-btn.danger:hover { background: var(--red-dim); }
 
    .groups-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; }
    @media(max-width:1100px){ .groups-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media(max-width:680px){ .groups-grid { grid-template-columns: 1fr; } }
 
    .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; transition: border-color 200ms ease; }
    .group-card:hover { border-color: var(--border2); }
    .group-card-header { padding: 8px 10px 6px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .group-card-header-left { display: flex; align-items: baseline; gap: 6px; }
    .group-card-header h2 { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--green); letter-spacing: 0.04em; text-transform: uppercase; }
    .group-card-header span { font-size: 11px; color: var(--muted); }
 
    .matches-toggle-btn { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 10px; font-weight: 500; transition: all 130ms ease; flex-shrink: 0; }
    .matches-toggle-btn:hover { background: var(--surface3); color: var(--text); }
    .matches-toggle-btn.open { color: var(--green); border-color: rgba(0,232,122,0.25); background: var(--green-dim); }
    .matches-toggle-btn svg { width: 9px; height: 9px; transition: transform 200ms ease; }
    .matches-toggle-btn.open svg { transform: rotate(180deg); }
 
    .matches-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 260ms ease; }
    .matches-wrapper.open { grid-template-rows: 1fr; }
    .matches-wrapper-inner { overflow: hidden; }
 
    .standings-wrap { padding: 0 6px; }
    .standings-wrap { padding: 0 4px; }
    table.standings { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    table.standings th { color: var(--muted); font-weight: 500; font-size: 10px; letter-spacing: 0.03em; text-transform: uppercase; padding: 6px 4px 4px; text-align: center; }
    table.standings th:first-child { text-align: left; padding-left: 6px; }
    table.standings td { padding: 5px 4px; text-align: center; color: var(--muted2); font-variant-numeric: tabular-nums; }
    table.standings td:first-child { text-align: left; padding-left: 6px; }
    table.standings tbody tr { border-radius: 6px; transition: background 100ms ease; cursor: grab; }
    table.standings tbody tr:active { cursor: grabbing; }
    table.standings tbody tr:hover { background: var(--surface2); }
    .qualified td { color: var(--text); }
    .qualified td:first-child { font-weight: 500; }
    .eliminated td { opacity: 0.45; }
    .q-indicator { display: inline-block; width: 3px; height: 12px; border-radius: 2px; margin-right: 5px; vertical-align: middle; }
    .q-1 .q-indicator { background: var(--green); }
    .q-2 .q-indicator { background: var(--blue); }
    tr.dragging { opacity: 0.3; background: var(--surface2); }
    tr.drag-over { outline: 1px dashed var(--green); outline-offset: -1px; background: var(--green-dim); }
 
    .team-label { display: inline-flex; align-items: center; gap: 5px; }
    .team-flag { width: 20px; height: 14px; border-radius: 3px; object-fit: cover; border: 1px solid var(--border2); flex-shrink: 0; display: block; background: var(--surface3); }
    .flag-placeholder { width: 20px; height: 14px; border-radius: 3px; background: var(--surface3); border: 1px solid var(--border2); display: block; flex-shrink: 0; }
    .team-text { font-weight: 500; color: var(--text); font-size: 12px; }
    .fp-input { width: 36px; padding: 2px 3px; border-radius: 4px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); text-align: center; font-size: 11px; font-family: inherit; }
    .fp-input:focus { outline: 1px solid var(--blue); border-color: var(--blue); }
 
    .manual-note { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 4px 10px 6px; font-size: 10.5px; color: var(--muted); }
    .manual-clear { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 5px; background: transparent; border: 1px solid var(--border2); color: var(--muted2); cursor: pointer; font-size: 10px; font-family: inherit; transition: all 130ms ease; }
    .manual-clear:hover { background: var(--surface3); color: var(--text); }
 
    .matches-list { display: flex; flex-direction: column; gap: 4px; padding: 6px 8px 10px; }
    .match-row { border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); overflow: hidden; transition: border-color 130ms ease; }
    .match-row:hover { border-color: var(--border2); }
    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 6px; padding: 6px 8px 4px; }
    .score-block { display: flex; align-items: center; gap: 4px; }
    .score-input { width: 30px; padding: 3px 1px; text-align: center; border-radius: 5px; border: 1px solid var(--border2); background: var(--surface3); color: var(--text); font-size: 12px; font-weight: 600; font-family: inherit; font-variant-numeric: tabular-nums; transition: border-color 130ms ease; }
    .score-input:focus { outline: none; border-color: var(--blue); }
    .result-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 24px; height: 18px; border-radius: 5px; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .pill-w { background: var(--green-dim); color: var(--green); }
    .pill-d { background: var(--blue-dim); color: var(--blue); }
    .pill-l { background: var(--red-dim); color: var(--red); }
    .outcome-buttons { display: flex; gap: 0; border-top: 1px solid var(--border); }
    .outcome-buttons button { flex: 1; padding: 5px 3px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 10.5px; font-weight: 500; font-family: inherit; transition: all 130ms ease; }
    .outcome-buttons button:last-child { border-right: none; }
    .outcome-buttons button:hover { background: var(--surface3); color: var(--text); }
    .outcome-buttons button.selected-A { background: var(--green-dim); color: var(--green); }
    .outcome-buttons button.selected-D { background: var(--blue-dim); color: var(--blue); }
    .outcome-buttons button.selected-B { background: var(--red-dim); color: var(--red); }
 
    .best-third-section { margin-top: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; }
    .best-third-header { padding: 10px 14px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .best-third-header h3 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #fff; }
    .best-thirds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 1px; background: var(--border); }
    .third-item { background: var(--surface); padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
    .third-item-rank { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
    .third-item-rank.qualifies { color: var(--amber); }
    .third-item-team { font-size: 12px; font-weight: 500; color: var(--text); }
    .third-item-stats { font-size: 10px; color: var(--muted); display: flex; gap: 8px; }
 
    /* ── BRACKET ── */
    .bracket-scroll { overflow-x: auto; overflow-y: visible; padding-bottom: 24px; }
 
    /* KO Cards */
    .ko-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 110ms ease; width: 120px; flex-shrink: 0; }
    .ko-card:hover { border-color: var(--border2); }
    .ko-card.won { border-color: rgba(0,232,122,0.28); }
    .ko-card-head { padding: 2px 6px 2px; border-bottom: 1px solid var(--border); font-size: 7.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .ko-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); transition: background 160ms; flex-shrink: 0; }
    .ko-dot.live { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .ko-team { display: flex; align-items: center; justify-content: space-between; gap: 3px; padding: 3px 6px; }
    .ko-team .tl { display: flex; align-items: center; gap: 3px; min-width: 0; flex: 1; }
    .ko-team .tl img { width: 16px; height: 11px; border-radius: 2px; object-fit: cover; border: 1px solid var(--border2); flex-shrink: 0; background: var(--surface3); }
    .ko-team .tl .fp { width: 16px; height: 11px; border-radius: 2px; background: var(--surface3); border: 1px solid var(--border2); flex-shrink: 0; display: block; }
    .ko-team .tn { font-size: 9.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
    .ko-team .sc { width: 22px; text-align: center; border-radius: 4px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 10px; font-weight: 700; font-family: inherit; padding: 1px 1px; flex-shrink: 0; }
    .ko-team .sc:focus { outline: none; border-color: var(--blue); }
    .ko-team .sc:disabled { opacity: 0.2; cursor: not-allowed; }
    .ko-team.winner .tn { color: var(--green); }
    .ko-team.winner .sc { border-color: rgba(0,232,122,0.35); color: var(--green); }
    .ko-team.loser { opacity: 0.3; }
    .ko-sep { height: 1px; background: var(--border); }
    .ko-btns { display: flex; border-top: 1px solid var(--border); }
    .ko-btns button { flex: 1; padding: 2px 1px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 7.5px; font-weight: 500; font-family: inherit; transition: all 100ms ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ko-btns button:last-child { border-right: none; }
    .ko-btns button:hover { background: var(--surface2); color: var(--text); }
    .ko-btns button.selA { background: var(--green-dim); color: var(--green); }
    .ko-btns button.selD { background: var(--blue-dim); color: var(--blue); }
    .ko-btns button.selB { background: var(--red-dim); color: var(--red); }
 
    .ko-card.final-card .ko-team .tn { font-size: 10px; font-weight: 600; }
    .ko-card.final-card { width: 135px; border-color: rgba(255,184,77,0.3); }
    .ko-card.final-card .ko-card-head { color: var(--amber); }
    .ko-card.third-card { border-color: rgba(255,184,77,0.12); }
    .ko-card.third-card .ko-card-head { color: var(--muted2); }
 
    /* Results */
    .results-champion { display: grid; place-items: center; min-height: 180px; text-align: center; }
    .champion-reveal { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 16px; }
    .champion-trophy-icon { font-size: 48px; line-height: 1; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    .champion-name { font-family: 'Syne', sans-serif; font-size: clamp(22px,4vw,36px); font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .champion-sub { color: var(--muted2); font-size: 13px; }
    .podium-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 4px; max-width: 420px; width: 100%; }
    .podium-item { padding: 12px 10px; border-radius: var(--r-lg); border: 1px solid var(--border); background: var(--surface); text-align: center; }
    .podium-medal { font-size: 22px; margin-bottom: 4px; }
    .podium-team { font-size: 13px; font-weight: 600; color: var(--text); }
    .podium-label { font-size: 10px; color: var(--muted); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.04em; }
    .pending-msg { color: var(--muted2); display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 40px 20px; }
    .pending-msg h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
 
    .champion-path { margin-top: 8px; width: 100%; max-width: 420px; }
    .champion-path h4 { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .path-match { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 10px; border-radius: 6px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 3px; font-size: 11px; }
    .path-match .pm-round { color: var(--muted); font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; min-width: 55px; }
    .path-match .pm-teams { color: var(--text); font-weight: 500; }
    .path-match .pm-score { color: var(--green); font-weight: 700; font-variant-numeric: tabular-nums; }
 
    .trophy-fab { position: fixed; bottom: 16px; right: 16px; width: 44px; height: 44px; border-radius: 50%; background: var(--green); color: #000; border: none; display: grid; place-items: center; font-size: 20px; box-shadow: 0 6px 24px rgba(0,232,122,0.3); transform: scale(0) rotate(-20deg); opacity: 0; transition: transform 250ms cubic-bezier(.34,1.56,.64,1), opacity 250ms ease; pointer-events: none; cursor: pointer; z-index: 100; }
    .trophy-fab.visible { transform: scale(1) rotate(0deg); opacity: 1; pointer-events: auto; }
    .trophy-fab:hover { transform: scale(1.1) rotate(0deg); box-shadow: 0 6px 30px rgba(0,232,122,0.5); }
 
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-icon">⚽</div>
      <div class="brand-text">
        <h1>Bracket Simulator</h1>
        <p>World Cup-style groups &amp; knockout stage</p>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="groups" type="button">Groups</button>
      <button class="tab" data-tab="bracket" type="button">Bracket</button>
      <button class="tab" data-tab="results" type="button">Results</button>
    </nav>
  </header>
 
  <div id="groups" class="panel visible">
    <div class="section-header">
      <div class="section-header-left">
        <h2>Group Stage</h2>
        <span class="section-badge">12 Groups</span>
      </div>
      <div class="matches-controls">
        <span class="matches-controls-label">Matches:</span>
        <button class="ctrl-btn" id="btnShowAll" type="button">Show All</button>
        <button class="ctrl-btn" id="btnHideAll" type="button">Hide All</button>
      </div>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
    <div class="best-third-section" id="bestThirdSection">
      <div class="best-third-header">
        <h3>Best Third-Place Teams</h3>
        <span class="section-badge">Top 8 advance</span>
      </div>
      <div class="best-thirds-grid" id="bestThirdsGrid"></div>
    </div>
  </div>
 
  <div id="bracket" class="panel">
    <div class="section-header">
      <div class="section-header-left">
        <h2>Knockout Stage</h2>
        <span class="section-badge" id="bracketStatus">48 Teams · 16 Matches</span>
      </div>
      <div class="matches-controls">
        <button class="ctrl-btn danger" id="btnResetBracket" type="button">Reset Bracket</button>
      </div>
    </div>
    <div class="bracket-scroll">
      <div id="bracketStage"></div>
    </div>
  </div>
 
  <div id="results" class="panel">
    <div class="section-header"><div class="section-header-left"><h2>Results</h2></div></div>
    <div id="resultsPanel"></div>
  </div>
</div>
 
<button class="trophy-fab" id="championTrophy" type="button" title="View Results">🏆</button>
 
<script>
/* ── Flag URLs ── */
const FLAG_CODES = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czechia':'cz',
  'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'USA':'us','Paraguay':'py','Australia':'au','Turkey':'tr',
  'Germany':'de','Curaçao':'cw',"Côte d'Ivoire":'ci','Ecuador':'ec',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
  'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa'
};
function flagUrl(n){ const c=FLAG_CODES[n]; return c?`https://flagcdn.com/w40/${c}.png`:null; }
 
/* ── State ── */
const state = {
  groups: {
    'Group A':['Mexico','South Africa','South Korea','Czechia'],
    'Group B':['Canada','Bosnia & Herzegovina','Qatar','Switzerland'],
    'Group C':['Brazil','Morocco','Haiti','Scotland'],
    'Group D':['USA','Paraguay','Australia','Turkey'],
    'Group E':['Germany','Curaçao',"Côte d'Ivoire",'Ecuador'],
    'Group F':['Netherlands','Japan','Sweden','Tunisia'],
    'Group G':['Belgium','Egypt','Iran','New Zealand'],
    'Group H':['Spain','Cape Verde','Saudi Arabia','Uruguay'],
    'Group I':['France','Senegal','Iraq','Norway'],
    'Group J':['Argentina','Algeria','Austria','Jordan'],
    'Group K':['Portugal','DR Congo','Uzbekistan','Colombia'],
    'Group L':['England','Croatia','Ghana','Panama']
  },
  matchesVisible:{},
  fairPlay:{},
  groupMatches:{},
  manualRanking:{},
  rounds:{r32:[],r16:[],qf:[],sf:[],final:[],third:[]},
  champion:null, runnerUp:null, thirdPlace:null
};
 
const MATCH_PAIRS = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];

/* ── Standings Engine ── */
function computeStandings(gName){
  const teams = state.groups[gName];
  const fp = state.fairPlay[gName];
  const stats = teams.map(team => ({
    team, MP:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0,
    fairPlay: Number((fp && fp[team]) || 0)
  }));
  const manual = state.manualRanking[gName];
  const useManual = Array.isArray(manual) && manual.length === teams.length;
 
  state.groupMatches[gName].forEach(m => {
    let sA = m.scoreA==='' ? null : Number(m.scoreA);
    let sB = m.scoreB==='' ? null : Number(m.scoreB);
    const a = stats[m.a], b = stats[m.b];
    if(sA===null||sB===null){
      if(m.outcome==='A'){sA=1;sB=0;}
      else if(m.outcome==='B'){sA=0;sB=1;}
      else if(m.outcome==='D'){sA=0;sB=0;}
      else return;
    }
    a.MP++;b.MP++;
    a.GF+=sA;a.GA+=sB;b.GF+=sB;b.GA+=sA;
    if(sA>sB){a.W++;b.L++;a.Pts+=3;}
    else if(sA<sB){b.W++;a.L++;b.Pts+=3;}
    else{a.D++;b.D++;a.Pts++;b.Pts++;}
  });
  stats.forEach(s=>s.GD=s.GF-s.GA);
 
  if(useManual) return manual.map(t=>stats.find(s=>s.team===t)||{team:t,MP:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,fairPlay:0});
 
  stats.sort(cmpStandings);
  const out=[]; let tied=[stats[0]];
  for(let i=1;i<stats.length;i++){
    const prev=stats[i-1],cur=stats[i];
    if(prev.Pts===cur.Pts&&prev.GD===cur.GD&&prev.GF===cur.GF) tied.push(cur);
    else{out.push(...(tied.length>1?resolveH2H(tied,gName):tied));tied=[cur];}
  }
  out.push(...(tied.length>1?resolveH2H(tied,gName):tied));
  return out;
}
 
function cmpStandings(a,b){
  if(b.Pts!==a.Pts) return b.Pts-a.Pts;
  if(b.GD!==a.GD)  return b.GD-a.GD;
  if(b.GF!==a.GF)  return b.GF-a.GF;
  if(a.fairPlay!==b.fairPlay) return a.fairPlay-b.fairPlay;
  return a.team.localeCompare(b.team);
}
 
function resolveH2H(tied, gName){
  const idxs = tied.map(t => state.groups[gName].indexOf(t.team));
  const h = tied.map(t => ({ ...t, h2hPts:0, h2hGF:0, h2hGA:0, h2hGD:0 }));
  state.groupMatches[gName].forEach(m => {
    const ai = idxs.indexOf(m.a), bi = idxs.indexOf(m.b);
    if(ai === -1 || bi === -1) return;
    const sA = Number(m.scoreA || 0), sB = Number(m.scoreB || 0);
    h[ai].h2hGF += sA; h[ai].h2hGA += sB;
    h[bi].h2hGF += sB; h[bi].h2hGA += sA;
    if(sA > sB) h[ai].h2hPts += 3;
    else if(sA < sB) h[bi].h2hPts += 3;
    else { h[ai].h2hPts++; h[bi].h2hPts++; }
  });
  h.forEach(s => s.h2hGD = s.h2hGF - s.h2hGA);
  h.sort((a, b) =>
    b.h2hPts - a.h2hPts ||
    b.h2hGD  - a.h2hGD  ||
    b.h2hGF  - a.h2hGF  ||
    a.fairPlay - b.fairPlay ||
    a.team.localeCompare(b.team)
  );
  return h;
}
 
function computeBestThirds(){
  return Object.keys(state.groups).map(g=>{
    const s=computeStandings(g)[2]||{team:'TBD',Pts:0,GD:0,GF:0,W:0};
    return {group:g,team:s.team,Pts:s.Pts,GD:s.GD,GF:s.GF,W:s.W||0};
  }).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||b.W-a.W||a.team.localeCompare(b.team));
}

function onDrop(e){
  e.preventDefault();
  const src=dragTeam, tgt=e.currentTarget.dataset.team, grp=e.currentTarget.dataset.group;
  e.currentTarget.classList.remove('drag-over');
  if(!src||src===tgt||grp!==dragGroup) return;
  let order;
  if(Array.isArray(state.manualRanking[grp])&&state.manualRanking[grp].length===state.groups[grp].length){
    order=[...state.manualRanking[grp]];
  } else {
    order=computeStandings(grp).map(s=>s.team);
  }
  const fi=order.indexOf(src), ti=order.indexOf(tgt);
  if(fi<0||ti<0) return;
  order.splice(fi,1);
  order.splice(ti,0,src);
  state.manualRanking[grp]=order;
  refreshAll(grp);
}

/* ── Knockout population ── */
function populateR32(){
  const thirds=computeBestThirds().slice(0,8).map(t=>t.team);
  const w=g=>computeStandings(`Group ${g}`)[0]?.team||'TBD';
  const r=g=>computeStandings(`Group ${g}`)[1]?.team||'TBD';
  const t3=i=>thirds[i]||'TBD';
 
  const slots = [
    {a:w('A'), b:t3(0), lbl:'WA vs 3(1)'},
    {a:w('B'), b:t3(1), lbl:'WB vs 3(2)'},
    {a:w('D'), b:t3(2), lbl:'WD vs 3(3)'},
    {a:w('E'), b:t3(3), lbl:'WE vs 3(4)'},
    {a:w('G'), b:t3(4), lbl:'WG vs 3(5)'},
    {a:w('I'), b:t3(5), lbl:'WI vs 3(6)'},
    {a:w('K'), b:t3(6), lbl:'WK vs 3(7)'},
    {a:w('L'), b:t3(7), lbl:'WL vs 3(8)'},
    {a:w('C'), b:r('F'), lbl:'WC vs RF'},
    {a:w('F'), b:r('C'), lbl:'WF vs RC'},
    {a:w('H'), b:r('J'), lbl:'WH vs RJ'},
    {a:w('J'), b:r('H'), lbl:'WJ vs RH'},
    {a:r('A'), b:r('D'), lbl:'RA vs RD'},
    {a:r('B'), b:r('G'), lbl:'RB vs RG'},
    {a:r('E'), b:r('I'), lbl:'RE vs RI'},
    {a:r('K'), b:r('L'), lbl:'RK vs RL'},
  ];
 
  slots.forEach((s,i)=>{
    const existing = state.rounds.r32[i];
    if(existing && existing.teamA===s.a && existing.teamB===s.b){
      existing.label=s.lbl;
    } else {
      state.rounds.r32[i] = mkMatch(s.a, s.b);
      state.rounds.r32[i].label = s.lbl;
    }
  });
}
 
function resetDownstream(){
  state.rounds.r16 = Array.from({length:8},()=>mkMatch());
  state.rounds.qf  = Array.from({length:4},()=>mkMatch());
  state.rounds.sf  = Array.from({length:2},()=>mkMatch());
  state.rounds.final = [mkMatch()];
  state.rounds.third = [mkMatch()];
  state.champion=null; state.runnerUp=null; state.thirdPlace=null;
  document.getElementById('championTrophy').classList.remove('visible');
}
 
function evalRound(round){
  state.rounds[round].forEach(m=>{
    m.winner=null;
    if(m.scoreA!==''&&m.scoreB!==''){
      const a=Number(m.scoreA),b=Number(m.scoreB);
      if(a!==b){m.winner=a>b?m.teamA:m.teamB;}
      return;
    }
    if(m.outcome==='A') m.winner=m.teamA;
    else if(m.outcome==='B') m.winner=m.teamB;
  });
}
 
function propagate(from,to){
  const src=state.rounds[from];
  state.rounds[to].forEach((m,i)=>{
    const left=src[i*2], right=src[i*2+1];
    const newA=left?.winner||'TBD', newB=right?.winner||'TBD';
    if(m.teamA!==newA||m.teamB!==newB){
      m.teamA=newA; m.teamB=newB;
      m.scoreA=''; m.scoreB=''; m.outcome=''; m.winner=null;
    }
  });
}
 
function propagateFinals(){
  const [sf1,sf2]=state.rounds.sf;
  const f=state.rounds.final[0];
  const newA=sf1.winner||'TBD', newB=sf2.winner||'TBD';
  if(f.teamA!==newA||f.teamB!==newB){
    f.teamA=newA; f.teamB=newB; f.scoreA=''; f.scoreB=''; f.outcome=''; f.winner=null;
  }
  const t=state.rounds.third[0];
  const loser1=sf1.winner?(sf1.teamA===sf1.winner?sf1.teamB:sf1.teamA):'TBD';
  const loser2=sf2.winner?(sf2.teamA===sf2.winner?sf2.teamB:sf2.teamA):'TBD';
  if(t.teamA!==loser1||t.teamB!==loser2){
    t.teamA=loser1; t.teamB=loser2; t.scoreA=''; t.scoreB=''; t.outcome=''; t.winner=null;
  }
}
 
function assignChampion(){
  const f=state.rounds.final[0];
  const t=state.rounds.third[0];
  state.champion=null; state.runnerUp=null; state.thirdPlace=null;
  if(f.scoreA!==''&&f.scoreB!==''){
    const a=Number(f.scoreA),b=Number(f.scoreB);
    if(a!==b){
      f.winner=a>b?f.teamA:f.teamB;
      state.champion=f.winner;
      state.runnerUp=f.winner===f.teamA?f.teamB:f.teamA;
    }
  } else if(f.outcome==='A'){ state.champion=f.teamA; state.runnerUp=f.teamB; f.winner=f.teamA; }
  else if(f.outcome==='B'){ state.champion=f.teamB; state.runnerUp=f.teamA; f.winner=f.teamB; }
  if(state.champion) document.getElementById('championTrophy').classList.add('visible');
  if(t.scoreA!==''&&t.scoreB!==''){
    const a=Number(t.scoreA),b=Number(t.scoreB);
    if(a!==b) t.winner=a>b?t.teamA:t.teamB;
  } else if(t.outcome==='A') t.winner=t.teamA;
  else if(t.outcome==='B') t.winner=t.teamB;
  state.thirdPlace=t.winner||null;
}
 
function traceChampionPath(){
  if(!state.champion) return [];
  const path=[];
  const c=state.champion;
 
  function findM(round,matchA,teamA,teamB){
    const m=state.rounds[round][matchA];
    if(!m||m.teamA==='TBD'||m.teamB==='TBD') return null;
    if(m.teamA===teamA&&m.teamB===teamB) return m;
    if(m.teamA===teamB&&m.teamB===teamA) return m;
    return null;
  }
 
  function fmt(round,label,m){
    if(!m) return null;
    const sA=m.scoreA!==''?m.scoreA:'?';
    const sB=m.scoreB!==''?m.scoreB:'?';
    const winner=m.winner||(m.outcome==='A'?m.teamA:m.outcome==='B'?m.teamB:null);
    const score=winner?`${sA}-${sB}`:`${sA}-${sB}`;
    return {round:label,teams:`${m.teamA} vs ${m.teamB}`,score,winner};
  }
 
  const finalM=state.rounds.final[0];
  const r=fmt('Final','Final',finalM);
  if(r) path.push(r);
 
  const sfIdx=state.rounds.sf.findIndex(m=>m.teamA===c||m.teamB===c);
  if(sfIdx>=0){
    const sfM=state.rounds.sf[sfIdx];
    path.push(fmt('SF',`Semi ${sfIdx+1}`,sfM));
    const qfIdx=state.rounds.qf.findIndex(m=>m.teamA===c||m.teamB===c);
    if(qfIdx>=0){
      const qfM=state.rounds.qf[qfIdx];
      path.push(fmt('QF',`Quarter ${qfIdx+1}`,qfM));
      const r16Idx=state.rounds.r16.findIndex(m=>m.teamA===c||m.teamB===c);
      if(r16Idx>=0){
        const r16M=state.rounds.r16[r16Idx];
        path.push(fmt('R16',`R16 ${r16Idx+1}`,r16M));
        const r32Idx=state.rounds.r32.findIndex(m=>m.teamA===c||m.teamB===c);
        if(r32Idx>=0){
          const r32M=state.rounds.r32[r32Idx];
          path.push(fmt('R32',`R32 ${r32Idx+1}`,r32M));
        }
      }
    }
  }
 
  return path;
}
 
/* ── Team Name Shortcuts ── */
const TEAM_SHORTCUTS = {
  'Bosnia & Herzegovina': 'BiH',
  'South Africa': 'RSA',
  'South Korea': 'KOR',
  "Côte d'Ivoire": 'CIV',
  'Saudi Arabia': 'KSA',
  'DR Congo': 'COD',
  'New Zealand': 'NZL'
};

function koFlag(name){
  const url=flagUrl(name);
  if(!url||name==='TBD') return '<span class="fp"></span>';
  return `<img src="${url}" alt="" loading="lazy" onerror="this.style.opacity=0">`;
}
function shortName(name){
  if(!name||name==='TBD') return name||'TBD';
  if(TEAM_SHORTCUTS[name]) return TEAM_SHORTCUTS[name];
  if(name.length<=9) return name;
  const parts = name.split(/\s+/);
  if(parts.length===1) return name.slice(0,6).toUpperCase();
  const abbr = parts.map(p=>p[0]).join('').toUpperCase();
  return abbr.length<=4 ? abbr : abbr.slice(0,3);
}
 
function buildKoCard(m, round, matchIdx, isThird=false, isFinal=false){
  const el=document.createElement('div');
  el.className='ko-card'+(m.winner?' won':'')+(isFinal?' final-card':'')+(isThird?' third-card':'');
  const aWins=m.winner===m.teamA, bWins=m.winner===m.teamB;
  const hasTBD=m.teamA==='TBD'||m.teamB==='TBD';
  const lbl=isThird?'3rd Place':isFinal?'Final':(m.label||`M${matchIdx+1}`);
  el.innerHTML=`
    <div class="ko-card-head">
      <span>${esc(lbl)}</span>
      <span class="ko-dot${m.winner?' live':''}"></span>
    </div>
    <div class="ko-team${aWins?' winner':bWins?' loser':''}">
      <div class="tl">${koFlag(m.teamA)}<span class="tn">${esc(m.teamA)}</span></div>
      <input class="sc" type="number" min="0" inputmode="numeric"
        data-round="${round}" data-match="${matchIdx}" data-side="A"
        value="${m.scoreA}" ${hasTBD?'disabled':''}>
    </div>
    <div class="ko-sep"></div>
    <div class="ko-team${bWins?' winner':aWins?' loser':''}">
      <div class="tl">${koFlag(m.teamB)}<span class="tn">${esc(m.teamB)}</span></div>
      <input class="sc" type="number" min="0" inputmode="numeric"
        data-round="${round}" data-match="${matchIdx}" data-side="B"
        value="${m.scoreB}" ${hasTBD?'disabled':''}>
    </div>
    <div class="ko-btns">
      <button type="button" class="${m.outcome==='A'?'selA':''}"
        data-round="${round}" data-match="${matchIdx}" data-outcome="A">${esc(shortName(m.teamA))}</button>
      <button type="button" class="${m.outcome==='D'?'selD':''}"
        data-round="${round}" data-match="${matchIdx}" data-outcome="D">Draw</button>
      <button type="button" class="${m.outcome==='B'?'selB':''}"
        data-round="${round}" data-match="${matchIdx}" data-outcome="B">${esc(shortName(m.teamB))}</button>
    </div>`;
  el.querySelectorAll('.sc').forEach(inp=>inp.addEventListener('input',onKoScore));
  el.querySelectorAll('.ko-btns button').forEach(btn=>btn.addEventListener('click',onKoOutcome));
  return el;
}
 
function renderBracket(){
  const stage=document.getElementById('bracketStage');
  stage.innerHTML='';

  const CW=120, CH=68, GAP_Y=8, COL_GAP=12;
  const halfN=8;
  const totalH=halfN*(CH+GAP_Y)-GAP_Y+20;

  // Column X positions — two halves feeding into center Final
  const l={r32:0, r16:CW+COL_GAP, qf:2*(CW+COL_GAP), sf:3*(CW+COL_GAP)};
  const leftEdge=l.sf+CW;
  const halfGap=CW+2*COL_GAP;
  const finalX=Math.round((leftEdge+leftEdge+halfGap-CW)/2);
  const r={sf:leftEdge+halfGap, qf:leftEdge+halfGap+CW+COL_GAP,
           r16:leftEdge+halfGap+2*(CW+COL_GAP), r32:leftEdge+halfGap+3*(CW+COL_GAP)};

  const totalW=r.r32+CW+COL_GAP;
  const containerH=totalH+80;

  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;width:${totalW}px;height:${containerH}px;margin-top:8px;`;

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',totalW);
  svg.setAttribute('height',containerH);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';
  wrap.appendChild(svg);

  // Round labels
  const labelTop=document.createElement('div');
  labelTop.style.cssText=`position:absolute;top:-28px;left:0;width:${totalW}px;height:24px;`;
  [
    {x:l.r32,t:'Round of 32',c:'var(--green)'},{x:l.r16,t:'Round of 16',c:'var(--green)'},
    {x:l.qf,t:'Quarterfinals',c:'var(--green)'},{x:l.sf,t:'Semifinals',c:'var(--green)'},
    {x:finalX,t:'Final',c:'var(--amber)'},
    {x:r.sf,t:'Semifinals',c:'var(--green)'},{x:r.qf,t:'Quarterfinals',c:'var(--green)'},
    {x:r.r16,t:'Round of 16',c:'var(--green)'},{x:r.r32,t:'Round of 32',c:'var(--green)'},
  ].forEach(lbl=>{
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${lbl.x}px;width:${CW}px;text-align:center;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:${lbl.c};`;
    el.textContent=lbl.t;
    labelTop.appendChild(el);
  });
  wrap.appendChild(labelTop);

  const matchPos={};
  ['r32','r16','qf','sf','final'].forEach(r=>matchPos[r]={});

  function ySlot(mi,round){
    if(round==='final') return totalH/2;
    const halfCnt={r32:8,r16:4,qf:2,sf:1}[round];
    const sl=totalH/halfCnt;
    return (mi%halfCnt)*sl+sl/2;
  }

  function placeCard(mi,round,x,isFinal){
    const cy=ySlot(mi,round);
    matchPos[round][mi]={x,y:cy-CH/2,cy};
    const m=state.rounds[round][mi]||mkMatch();
    const card=buildKoCard(m,round,mi,false,isFinal||false);
    card.style.cssText=`position:absolute;left:${x}px;top:${cy-CH/2}px;width:${CW}px;`;
    wrap.appendChild(card);
  }

  // --- Left half cards ---
  for(let i=0;i<8;i++)  placeCard(i,'r32',l.r32);
  for(let i=0;i<4;i++)  placeCard(i,'r16',l.r16);
  for(let i=0;i<2;i++)  placeCard(i,'qf',l.qf);
  placeCard(0,'sf',l.sf);

  // --- Right half cards ---
  for(let i=8;i<16;i++) placeCard(i,'r32',r.r32);
  for(let i=4;i<8;i++)  placeCard(i,'r16',r.r16);
  for(let i=2;i<4;i++)  placeCard(i,'qf',r.qf);
  placeCard(1,'sf',r.sf);

  // --- Final card ---
  placeCard(0,'final',finalX,true);

  // --- 3rd place below final ---
  const thirdY=totalH+6;
  {
    const m=state.rounds.third[0]||mkMatch();
    const card=buildKoCard(m,'third',0,true,false);
    card.style.cssText=`position:absolute;left:${finalX}px;top:${thirdY}px;width:${CW}px;`;
    wrap.appendChild(card);
    const tl=document.createElement('div');
    tl.style.cssText=`position:absolute;left:${finalX}px;top:${thirdY-16}px;width:${CW}px;text-align:center;font-size:8px;color:var(--muted);font-weight:600;letter-spacing:0.05em;text-transform:uppercase;`;
    tl.textContent='3rd Place Match';
    wrap.appendChild(tl);
  }

  // --- Trophy above final ---
  {
    const fp=matchPos.final[0];
    if(fp){
      const trophy=document.createElement('div');
      trophy.style.cssText=`position:absolute;left:${fp.x}px;top:${fp.y-48}px;width:${CW}px;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;`;
      trophy.innerHTML=`<div style="font-size:22px">🏆</div>
        <div style="font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--amber)">Champion</div>
        ${state.champion?`<div style="font-size:10px;font-weight:600;color:var(--green);text-align:center">${esc(state.champion)}</div>`:''}`;
      wrap.appendChild(trophy);
    }
  }

  // --- Connector lines ---
  const lineColor='rgba(255,255,255,0.10)';
  const winColor='rgba(0,232,122,0.7)';

  function drawBranch(x1,cy1,x2,cy2,isWinner){
    const stroke=isWinner?winColor:lineColor;
    const width=isWinner?'2.5':'1.5';
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx=x1+(x2-x1)*0.5;
    path.setAttribute('d',`M${x1},${cy1} H${mx} V${cy2} H${x2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',stroke);
    path.setAttribute('stroke-width',width);
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('stroke-linejoin','round');
    path.setAttribute('opacity',isWinner?'1':'0.5');
    svg.appendChild(path);
  }

  const roundKeys=['r32','r16','qf','sf','final'];
  for(let ri=0;ri<roundKeys.length-1;ri++){
    const fromKey=roundKeys[ri];
    const toKey=roundKeys[ri+1];
    const toCount=state.rounds[toKey].length;
    const fromMatches=state.rounds[fromKey]||[];
    const toMatches=state.rounds[toKey]||[];

    for(let ti=0;ti<toCount;ti++){
      const srcA_idx=ti*2, srcB_idx=ti*2+1;
      const fromA=matchPos[fromKey][srcA_idx];
      const fromB=matchPos[fromKey][srcB_idx];
      const toP=matchPos[toKey][ti];
      if(!fromA||!fromB||!toP) continue;

      const mA=fromMatches[srcA_idx];
      const mB=fromMatches[srcB_idx];
      const toMatch=toMatches[ti];

      const wonA=mA&&mA.winner&&toMatch&&mA.winner===toMatch.teamA;
      const wonB=mB&&mB.winner&&toMatch&&mB.winner===toMatch.teamB;

      drawBranch(fromA.x+CW, fromA.cy, toP.x, toP.cy, !!wonA);
      drawBranch(fromB.x+CW, fromB.cy, toP.x, toP.cy, !!wonB);
    }
  }

  // SF → 3rd place connectors
  const sf0=matchPos.sf[0], sf1=matchPos.sf[1];
  const thirdCY=thirdY+CH/2;
  if(sf0) drawBranch(sf0.x+CW,sf0.cy,finalX,thirdCY,false);
  if(sf1) drawBranch(sf1.x+CW,sf1.cy,finalX,thirdCY,false);

  const outerWrap=document.createElement('div');
  outerWrap.style.cssText='position:relative;padding-top:32px;';
  outerWrap.appendChild(wrap);
  stage.appendChild(outerWrap);
}
 
function onKoScore(e){
  const{round,match,side}=e.target.dataset;
  const val=e.target.value===''?'':Math.max(0,Math.floor(Number(e.target.value)));
  state.rounds[round][Number(match)][side==='A'?'scoreA':'scoreB']=val;
  onKoChange(round);
}
function onKoOutcome(e){
  const{round,match,outcome}=e.target.dataset;
  const m=state.rounds[round][Number(match)];
  m.outcome=m.outcome===outcome?'':outcome;
  onKoChange(round);
}
function onKoChange(round){
  evalRound(round);
  if(round==='r32') { propagate('r32','r16'); propagate('r16','qf'); propagate('qf','sf'); propagateFinals(); }
  else if(round==='r16') { propagate('r16','qf'); propagate('qf','sf'); propagateFinals(); }
  else if(round==='qf')  { propagate('qf','sf'); propagateFinals(); }
  else if(round==='sf')  { propagateFinals(); }
  if(round==='final'||round==='third'||round==='sf') assignChampion();
  renderBracket();
  renderResults();
  updateBracketStatus();
}
 
function updateBracketStatus(){
  const el=document.getElementById('bracketStatus');
  if(!el) return;
  const rounds=[{k:'r32',n:'R32'},{k:'r16',n:'R16'},{k:'qf',n:'QF'},{k:'sf',n:'SF'},{k:'final',n:'Final'}];
  const done=rounds.filter(r=>state.rounds[r.k].some(m=>m.winner)).length;
  el.textContent=`${done}/5 Rounds Set — ${state.champion?'Champion: '+state.champion:'In Progress'}`;
}
 
function resetBracket(){
  if(!confirm('Reset all knockout stage results?')) return;
  resetDownstream();
  state.rounds.r32.forEach(m=>{ m.scoreA=''; m.scoreB=''; m.outcome=''; m.winner=null; });
  renderBracket();
  renderResults();
  updateBracketStatus();
  document.getElementById('championTrophy').classList.remove('visible');
}
 
function renderResults(){
  const panel=document.getElementById('resultsPanel');
  if(state.champion){
    const path=traceChampionPath();
    const pathHtml=path.length?`
      <div class="champion-path">
        <h4>Champion's Path</h4>
        ${path.map(p=>`<div class="path-match"><span class="pm-round">${p.round}</span><span class="pm-teams">${esc(p.teams)}</span><span class="pm-score">${esc(p.score)}</span></div>`).join('')}
      </div>`:'';
    panel.innerHTML=`
      <div class="results-champion">
        <div class="champion-reveal">
          <div class="champion-trophy-icon">🏆</div>
          <div class="champion-name">${esc(state.champion)}</div>
          <div class="champion-sub">World Cup Simulator Champion</div>
          <div class="podium-grid">
            <div class="podium-item"><div class="podium-medal">🥇</div><div class="podium-team">${esc(state.champion)}</div><div class="podium-label">Champion</div></div>
            <div class="podium-item"><div class="podium-medal">🥈</div><div class="podium-team">${esc(state.runnerUp||'TBD')}</div><div class="podium-label">Runner-up</div></div>
            <div class="podium-item"><div class="podium-medal">🥉</div><div class="podium-team">${esc(state.thirdPlace||'TBD')}</div><div class="podium-label">3rd Place</div></div>
          </div>
          ${pathHtml}
        </div>
      </div>`;
  } else {
    panel.innerHTML=`<div class="pending-msg"><h2>Champion Pending</h2><p>Complete the knockout bracket to reveal the winner.</p><p style="font-size:12px;color:var(--muted)">Go to the <strong>Bracket</strong> tab and fill in scores for each match.</p></div>`;
  }
}
 
function attachTabs(){
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('visible'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('visible');
    });
  });
}
 
function init(){
  Object.keys(state.groups).forEach(g=>{
    state.groupMatches[g]=MATCH_PAIRS.map(([a,b])=>mkGroupMatch(a,b));
    state.fairPlay[g]={};
    state.groups[g].forEach(t=>{ state.fairPlay[g][t]=0; });
    state.matchesVisible[g]=false;
  });
  state.rounds.r32 = Array.from({length:16}, ()=>mkMatch());
  resetDownstream();
 
  renderGroups();
  populateR32();
  renderBracket();
  renderResults();
  attachTabs();
  updateBracketStatus();
 
  document.getElementById('btnShowAll').addEventListener('click',()=>setAllMatches(true));
  document.getElementById('btnHideAll').addEventListener('click',()=>setAllMatches(false));
  document.getElementById('btnResetBracket').addEventListener('click',resetBracket);
  document.getElementById('championTrophy').addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('visible'));
    document.querySelector('.tab[data-tab="results"]').classList.add('active');
    document.getElementById('results').classList.add('visible');
  });
}
 
init();
</script>
