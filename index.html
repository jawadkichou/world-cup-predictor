<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>World Cup Bracket Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #171a21;
      --surface3: #1e2230;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e4eaf5;
      --muted: #6b7a94;
      --muted2: #8e9ab5;
      --green: #00e87a;
      --green-dim: rgba(0,232,122,0.12);
      --blue: #4da6ff;
      --blue-dim: rgba(77,166,255,0.12);
      --red: #ff5568;
      --red-dim: rgba(255,85,104,0.12);
      --amber: #ffb84d;
      --amber-dim: rgba(255,184,77,0.12);
      --r: 10px; --r-lg: 16px; --r-xl: 20px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; line-height: 1.6; min-height: 100vh; }
    .app { max-width: 1380px; margin: 0 auto; padding: 24px 20px 60px; }
 
    header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 20px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 16px; }
    .brand-icon { width: 48px; height: 48px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border2); display: grid; place-items: center; font-size: 22px; flex-shrink: 0; }
    .brand-text h1 { font-family: 'Syne', sans-serif; font-size: clamp(18px,2.4vw,26px); font-weight: 800; letter-spacing: -0.5px; color: #fff; }
    .brand-text p { color: var(--muted2); font-size: 13px; margin-top: 2px; }
 
    .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; }
    .tab { padding: 9px 20px; border-radius: 8px; background: transparent; color: var(--muted2); cursor: pointer; border: none; font-family: inherit; font-size: 13px; font-weight: 500; transition: all 160ms ease; white-space: nowrap; }
    .tab:hover { color: var(--text); background: var(--surface2); }
    .tab.active { background: var(--surface3); color: #fff; border: 1px solid var(--border2); }
 
    .panel { display: none; }
    .panel.visible { display: block; }
 
    .section-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .section-header-left { display: flex; align-items: center; gap: 10px; }
    .section-header h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; }
    .section-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,232,122,0.2); letter-spacing: 0.04em; text-transform: uppercase; }
 
    .matches-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .matches-controls-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-right: 2px; }
    .ctrl-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted2); cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 500; transition: all 150ms ease; white-space: nowrap; }
    .ctrl-btn:hover { background: var(--surface3); color: var(--text); }
    .ctrl-btn.active { background: var(--green-dim); color: var(--green); border-color: rgba(0,232,122,0.3); }
 
    .groups-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    @media(max-width:1100px){ .groups-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media(max-width:680px){ .groups-grid { grid-template-columns: 1fr; } }
 
    .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; transition: border-color 200ms ease; }
    .group-card:hover { border-color: var(--border2); }
    .group-card-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .group-card-header-left { display: flex; align-items: baseline; gap: 8px; }
    .group-card-header h2 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--green); letter-spacing: 0.04em; text-transform: uppercase; }
    .group-card-header span { font-size: 12px; color: var(--muted); }
 
    .matches-toggle-btn { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 500; transition: all 150ms ease; flex-shrink: 0; }
    .matches-toggle-btn:hover { background: var(--surface3); color: var(--text); }
    .matches-toggle-btn.open { color: var(--green); border-color: rgba(0,232,122,0.25); background: var(--green-dim); }
    .matches-toggle-btn svg { width: 11px; height: 11px; transition: transform 200ms ease; }
    .matches-toggle-btn.open svg { transform: rotate(180deg); }
 
    .matches-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 260ms ease; }
    .matches-wrapper.open { grid-template-rows: 1fr; }
    .matches-wrapper-inner { overflow: hidden; }
 
    .standings-wrap { padding: 0 6px; }
    table.standings { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    table.standings th { color: var(--muted); font-weight: 500; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; padding: 10px 6px 6px; text-align: center; }
    table.standings th:first-child { text-align: left; padding-left: 8px; }
    table.standings td { padding: 7px 6px; text-align: center; color: var(--muted2); font-variant-numeric: tabular-nums; }
    table.standings td:first-child { text-align: left; padding-left: 8px; }
    table.standings tbody tr { border-radius: 8px; transition: background 120ms ease; cursor: grab; }
    table.standings tbody tr:active { cursor: grabbing; }
    table.standings tbody tr:hover { background: var(--surface2); }
    .qualified td { color: var(--text); }
    .qualified td:first-child { font-weight: 500; }
    .eliminated td { opacity: 0.5; }
    .q-indicator { display: inline-block; width: 3px; height: 14px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
    .q-1 .q-indicator { background: var(--green); }
    .q-2 .q-indicator { background: var(--blue); }
    tr.dragging { opacity: 0.35; background: var(--surface2); }
    tr.drag-over { outline: 1px dashed var(--green); outline-offset: -1px; background: var(--green-dim); }
 
    .team-label { display: inline-flex; align-items: center; gap: 7px; }
    .team-flag { width: 28px; height: 20px; border-radius: 4px; object-fit: cover; border: 1px solid var(--border2); flex-shrink: 0; display: block; background: var(--surface3); }
    .flag-placeholder { width: 28px; height: 20px; border-radius: 4px; background: var(--surface3); border: 1px solid var(--border2); display: block; flex-shrink: 0; }
    .team-text { font-weight: 500; color: var(--text); font-size: 13px; }
    .fp-input { width: 44px; padding: 3px 4px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); text-align: center; font-size: 12px; font-family: inherit; }
    .fp-input:focus { outline: 1px solid var(--blue); border-color: var(--blue); }
 
    .manual-note { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 6px 12px 8px; font-size: 11.5px; color: var(--muted); }
    .manual-clear { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 6px; background: transparent; border: 1px solid var(--border2); color: var(--muted2); cursor: pointer; font-size: 11px; font-family: inherit; transition: all 150ms ease; }
    .manual-clear:hover { background: var(--surface3); color: var(--text); }
 
    .matches-list { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px 12px; }
    .match-row { border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); overflow: hidden; transition: border-color 150ms ease; }
    .match-row:hover { border-color: var(--border2); }
    .match-teams { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; padding: 9px 10px 7px; }
    .score-block { display: flex; align-items: center; gap: 6px; }
    .score-input { width: 36px; padding: 5px 2px; text-align: center; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface3); color: var(--text); font-size: 13px; font-weight: 600; font-family: inherit; font-variant-numeric: tabular-nums; transition: border-color 150ms ease; }
    .score-input:focus { outline: none; border-color: var(--blue); }
    .result-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 28px; height: 20px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .pill-w { background: var(--green-dim); color: var(--green); }
    .pill-d { background: var(--blue-dim); color: var(--blue); }
    .pill-l { background: var(--red-dim); color: var(--red); }
    .outcome-buttons { display: flex; gap: 0; border-top: 1px solid var(--border); }
    .outcome-buttons button { flex: 1; padding: 7px 4px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 11.5px; font-weight: 500; font-family: inherit; transition: all 150ms ease; }
    .outcome-buttons button:last-child { border-right: none; }
    .outcome-buttons button:hover { background: var(--surface3); color: var(--text); }
    .outcome-buttons button.selected-A { background: var(--green-dim); color: var(--green); }
    .outcome-buttons button.selected-D { background: var(--blue-dim); color: var(--blue); }
    .outcome-buttons button.selected-B { background: var(--red-dim); color: var(--red); }
 
    .best-third-section { margin-top: 28px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); overflow: hidden; }
    .best-third-header { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .best-third-header h3 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: #fff; }
    .best-thirds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1px; background: var(--border); }
    .third-item { background: var(--surface); padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
    .third-item-rank { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .third-item-rank.qualifies { color: var(--amber); }
    .third-item-team { font-size: 13px; font-weight: 500; color: var(--text); }
    .third-item-stats { font-size: 11px; color: var(--muted); display: flex; gap: 10px; }
 
    /* ── BRACKET ── */
    .bracket-scroll { overflow-x: auto; overflow-y: visible; padding-bottom: 24px; }
 
    .bracket-stage { display: inline-flex; flex-direction: column; gap: 0; min-width: max-content; }
 
    .bracket-round-labels { display: flex; gap: 0; }
    .round-label { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); padding: 8px 0 10px; text-align: center; flex-shrink: 0; }
    .round-label.final-lbl { color: var(--amber); }
 
    .bracket-body { display: flex; align-items: stretch; gap: 0; }
 
    .bracket-col { display: flex; flex-direction: column; justify-content: space-around; flex-shrink: 0; }
 
    .bracket-connector { display: flex; flex-direction: column; justify-content: space-around; flex-shrink: 0; position: relative; }
 
    /* KO Cards */
    .ko-card { magin:40px;background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 150ms ease; width: 172px; flex-shrink: 0; }
    .ko-card:hover { border-color: var(--border2); }
    .ko-card.won { border-color: rgba(0,232,122,0.28); }
    .ko-card-head { padding: 4px 8px 3px; border-bottom: 1px solid var(--border); font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; justify-content: space-between; }
    .ko-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); transition: background 200ms; flex-shrink: 0; }
    .ko-dot.live { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .ko-team { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 5px 8px; }
    .ko-team .tl { display: flex; align-items: center; gap: 5px; min-width: 0; flex: 1; }
    .ko-team .tl img { width: 22px; height: 15px; border-radius: 3px; object-fit: cover; border: 1px solid var(--border2); flex-shrink: 0; background: var(--surface3); }
    .ko-team .tl .fp { width: 22px; height: 15px; border-radius: 3px; background: var(--surface3); border: 1px solid var(--border2); flex-shrink: 0; display: block; }
    .ko-team .tn { font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
    .ko-team .sc { width: 26px; text-align: center; border-radius: 5px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); font-size: 12px; font-weight: 700; font-family: inherit; padding: 2px 1px; flex-shrink: 0; }
    .ko-team .sc:focus { outline: none; border-color: var(--blue); }
    .ko-team .sc:disabled { opacity: 0.3; cursor: not-allowed; }
    .ko-team.winner .tn { color: var(--green); }
    .ko-team.winner .sc { border-color: rgba(0,232,122,0.35); color: var(--green); }
    .ko-team.loser { opacity: 0.38; }
    .ko-sep { height: 1px; background: var(--border); }
    .ko-btns { display: flex; border-top: 1px solid var(--border); }
    .ko-btns button { flex: 1; padding: 5px 2px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 9.5px; font-weight: 500; font-family: inherit; transition: all 130ms ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ko-btns button:last-child { border-right: none; }
    .ko-btns button:hover { background: var(--surface2); color: var(--text); }
    .ko-btns button.selA { background: var(--green-dim); color: var(--green); }
    .ko-btns button.selD { background: var(--blue-dim); color: var(--blue); }
    .ko-btns button.selB { background: var(--red-dim); color: var(--red); }
 
    .ko-card.final-card .ko-team .tn { font-size: 13px; font-weight: 600; }
    .ko-card.final-card { width: 200px; border-color: rgba(255,184,77,0.3); }
    .ko-card.final-card .ko-card-head { color: var(--amber); }
 
    /* SVG connectors overlay approach - use flex + svg lines */
    .col-gap { width: 32px; display: flex; flex-direction: column; justify-content: space-around; position: relative; }
 
    .trophy-section { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 16px; gap: 4px; }
    .trophy-icon { font-size: 32px; line-height: 1; }
    .trophy-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); }
    .trophy-winner { font-size: 12px; font-weight: 600; color: var(--green); text-align: center; max-width: 80px; }
 
    .third-place-wrap { display: flex; flex-direction: column; align-items: center; margin-top: 12px; gap: 4px; }
    .third-place-label { font-size: 9px; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
 
    /* Results */
    .results-panel { display: grid; place-items: center; min-height: 240px; text-align: center; }
    .champion-reveal { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px; }
    .champion-trophy { font-size: 56px; line-height: 1; }
    .champion-name { font-family: 'Syne', sans-serif; font-size: clamp(24px,5vw,42px); font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .champion-sub { color: var(--muted2); font-size: 14px; }
    .podium-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 24px; max-width: 500px; }
    .podium-item { padding: 14px; border-radius: var(--r-lg); border: 1px solid var(--border); background: var(--surface); text-align: center; }
    .podium-medal { font-size: 24px; margin-bottom: 6px; }
    .podium-team { font-size: 13px; font-weight: 600; color: var(--text); }
    .podium-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pending-msg { color: var(--muted2); }
    .pending-msg h2 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
 
    .trophy-fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--green); color: #000; display: grid; place-items: center; font-size: 26px; box-shadow: 0 8px 32px rgba(0,232,122,0.3); transform: scale(0) rotate(-20deg); opacity: 0; transition: transform 280ms cubic-bezier(.34,1.56,.64,1), opacity 280ms ease; pointer-events: none; z-index: 100; }
    .trophy-fab.visible { transform: scale(1) rotate(0deg); opacity: 1; }
 
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-icon">⚽</div>
      <div class="brand-text">
        <h1>Bracket Simulator</h1>
        <p>World Cup-style groups &amp; knockout stage</p>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="groups" type="button">Groups</button>
      <button class="tab" data-tab="bracket" type="button">Bracket</button>
      <button class="tab" data-tab="results" type="button">Results</button>
    </nav>
  </header>
 
  <div id="groups" class="panel visible">
    <div class="section-header">
      <div class="section-header-left">
        <h2>Group Stage</h2>
        <span class="section-badge">12 Groups</span>
      </div>
      <div class="matches-controls">
        <span class="matches-controls-label">Matches:</span>
        <button class="ctrl-btn" id="btnShowAll" type="button">Show All</button>
        <button class="ctrl-btn" id="btnHideAll" type="button">Hide All</button>
      </div>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
    <div class="best-third-section" id="bestThirdSection">
      <div class="best-third-header">
        <h3>Best Third-Place Teams</h3>
        <span class="section-badge">Top 8 advance</span>
      </div>
      <div class="best-thirds-grid" id="bestThirdsGrid"></div>
    </div>
  </div>
 
  <div id="bracket" class="panel">
    <div class="section-header">
      <div class="section-header-left">
        <h2>Knockout Stage</h2>
        <span class="section-badge">48 Teams · 16 Matches</span>
      </div>
    </div>
    <div class="bracket-scroll">
      <div id="bracketStage"></div>
    </div>
  </div>
 
  <div id="results" class="panel">
    <div class="section-header"><div class="section-header-left"><h2>Results</h2></div></div>
    <div class="results-panel" id="resultsPanel"></div>
  </div>
</div>
 
<div class="trophy-fab" id="championTrophy">🏆</div>
 
<script>
/* ── Flag URLs ── */
const FLAG_CODES = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czechia':'cz',
  'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'USA':'us','Paraguay':'py','Australia':'au','Turkey':'tr',
  'Germany':'de','Curaçao':'cw',"Côte d'Ivoire":'ci','Ecuador':'ec',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
  'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa'
};
function flagUrl(n){ const c=FLAG_CODES[n]; return c?`https://flagcdn.com/w40/${c}.png`:null; }
 
/* ── State ── */
const state = {
  groups: {
    'Group A':['Mexico','South Africa','South Korea','Czechia'],
    'Group B':['Canada','Bosnia & Herzegovina','Qatar','Switzerland'],
    'Group C':['Brazil','Morocco','Haiti','Scotland'],
    'Group D':['USA','Paraguay','Australia','Turkey'],
    'Group E':['Germany','Curaçao',"Côte d'Ivoire",'Ecuador'],
    'Group F':['Netherlands','Japan','Sweden','Tunisia'],
    'Group G':['Belgium','Egypt','Iran','New Zealand'],
    'Group H':['Spain','Cape Verde','Saudi Arabia','Uruguay'],
    'Group I':['France','Senegal','Iraq','Norway'],
    'Group J':['Argentina','Algeria','Austria','Jordan'],
    'Group K':['Portugal','DR Congo','Uzbekistan','Colombia'],
    'Group L':['England','Croatia','Ghana','Panama']
  },
  matchesVisible:{},
  fairPlay:{},
  groupMatches:{},
  manualRanking:{},
  // Knockout: 16 R32 matches → 8 R16 → 4 QF → 2 SF → 1 Final + 1 Third
  rounds:{r32:[],r16:[],qf:[],sf:[],final:[],third:[]},
  champion:null, runnerUp:null, thirdPlace:null
};
 
const MATCH_PAIRS = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];

/* ── Standings Engine ── */
function computeStandings(gName){
  const teams = state.groups[gName];
  const fp = state.fairPlay[gName];
  const stats = teams.map(team => ({
    team, MP:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0,
    fairPlay: Number((fp && fp[team]) || 0)
  }));
  const manual = state.manualRanking[gName];
  const useManual = Array.isArray(manual) && manual.length === teams.length;
 
  state.groupMatches[gName].forEach(m => {
    let sA = m.scoreA==='' ? null : Number(m.scoreA);
    let sB = m.scoreB==='' ? null : Number(m.scoreB);
    const a = stats[m.a], b = stats[m.b];
    if(sA===null||sB===null){
      if(m.outcome==='A'){sA=1;sB=0;}
      else if(m.outcome==='B'){sA=0;sB=1;}
      else if(m.outcome==='D'){sA=0;sB=0;}
      else return;
    }
    a.MP++;b.MP++;
    a.GF+=sA;a.GA+=sB;b.GF+=sB;b.GA+=sA;
    if(sA>sB){a.W++;b.L++;a.Pts+=3;}
    else if(sA<sB){b.W++;a.L++;b.Pts+=3;}
    else{a.D++;b.D++;a.Pts++;b.Pts++;}
  });
  stats.forEach(s=>s.GD=s.GF-s.GA);
 
  if(useManual) return manual.map(t=>stats.find(s=>s.team===t)||{team:t,MP:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,fairPlay:0});
 
  stats.sort(cmpStandings);
  const out=[]; let tied=[stats[0]];
  for(let i=1;i<stats.length;i++){
    const prev=stats[i-1],cur=stats[i];
    if(prev.Pts===cur.Pts&&prev.GD===cur.GD&&prev.GF===cur.GF) tied.push(cur);
    else{out.push(...(tied.length>1?resolveH2H(tied,gName):tied));tied=[cur];}
  }
  out.push(...(tied.length>1?resolveH2H(tied,gName):tied));
  return out;
}
 
function cmpStandings(a,b){
  if(b.Pts!==a.Pts) return b.Pts-a.Pts;
  if(b.GD!==a.GD)  return b.GD-a.GD;
  if(b.GF!==a.GF)  return b.GF-a.GF;
  if(a.fairPlay!==b.fairPlay) return a.fairPlay-b.fairPlay;
  return a.team.localeCompare(b.team);
}
 
function resolveH2H(tied, gName){
  const idxs = tied.map(t => state.groups[gName].indexOf(t.team));
  const h = tied.map(t => ({ ...t, h2hPts:0, h2hGF:0, h2hGA:0, h2hGD:0 }));
  state.groupMatches[gName].forEach(m => {
    const ai = idxs.indexOf(m.a), bi = idxs.indexOf(m.b);
    if(ai === -1 || bi === -1) return;
    const sA = Number(m.scoreA || 0), sB = Number(m.scoreB || 0);
    h[ai].h2hGF += sA; h[ai].h2hGA += sB;
    h[bi].h2hGF += sB; h[bi].h2hGA += sA;
    if(sA > sB) h[ai].h2hPts += 3;
    else if(sA < sB) h[bi].h2hPts += 3;
    else { h[ai].h2hPts++; h[bi].h2hPts++; }
  });
  h.forEach(s => s.h2hGD = s.h2hGF - s.h2hGA);
  h.sort((a, b) =>
    b.h2hPts - a.h2hPts ||
    b.h2hGD  - a.h2hGD  ||
    b.h2hGF  - a.h2hGF  ||
    a.fairPlay - b.fairPlay ||
    a.team.localeCompare(b.team)
  );
  return h;
}
 
function computeBestThirds(){
  return Object.keys(state.groups).map(g=>{
    const s=computeStandings(g)[2]||{team:'TBD',Pts:0,GD:0,GF:0,W:0};
    return {group:g,team:s.team,Pts:s.Pts,GD:s.GD,GF:s.GF,W:s.W||0};
  }).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||b.W-a.W||a.team.localeCompare(b.team));
}

/* ── Knockout population ── */
function populateR32(){
  const thirds=computeBestThirds().slice(0,8);
  const thirdMap=Object.fromEntries(thirds.map(t=>[t.group.replace('Group ',''),t.team]));
  const w=g=>computeStandings(`Group ${g}`)[0]?.team||'TBD';
  const r=g=>computeStandings(`Group ${g}`)[1]?.team||'TBD';
 
  // 16 R32 matches: clear and rebuild
  // Matches 0-7: Winner vs Best 3rd
  // Matches 8-11: Winner vs Runner-up cross
  // Matches 12-15: Runner-up vs Runner-up
  const slots = [
    {a:w('A'), b:thirdMap['B']||'3rd B', lbl:'WA vs 3B'},
    {a:w('B'), b:thirdMap['C']||'3rd C', lbl:'WB vs 3C'},
    {a:w('D'), b:thirdMap['E']||'3rd E', lbl:'WD vs 3E'},
    {a:w('E'), b:thirdMap['F']||'3rd F', lbl:'WE vs 3F'},
    {a:w('G'), b:thirdMap['H']||'3rd H', lbl:'WG vs 3H'},
    {a:w('I'), b:thirdMap['J']||'3rd J', lbl:'WI vs 3J'},
    {a:w('K'), b:thirdMap['L']||'3rd L', lbl:'WK vs 3L'},
    {a:w('L'), b:thirdMap['A']||'3rd A', lbl:'WL vs 3A'},
    {a:w('C'), b:r('F'),              lbl:'WC vs RF'},
    {a:w('F'), b:r('C'),              lbl:'WF vs RC'},
    {a:w('H'), b:r('J'),              lbl:'WH vs RJ'},
    {a:w('J'), b:r('H'),              lbl:'WJ vs RH'},
    {a:r('A'), b:r('D'),              lbl:'RA vs RD'},
    {a:r('B'), b:r('G'),              lbl:'RB vs RG'},
    {a:r('E'), b:r('I'),              lbl:'RE vs RI'},
    {a:r('K'), b:r('L'),              lbl:'RK vs RL'},
  ];
 
  // Preserve existing scores/outcomes if teams haven't changed
  slots.forEach((s,i)=>{
    const existing = state.rounds.r32[i];
    if(existing && existing.teamA===s.a && existing.teamB===s.b){
      existing.label=s.lbl;
    } else {
      state.rounds.r32[i] = mkMatch(s.a, s.b);
      state.rounds.r32[i].label = s.lbl;
    }
  });
 
  // Reset downstream
  state.rounds.r16 = Array.from({length:8},()=>mkMatch());
  state.rounds.qf  = Array.from({length:4},()=>mkMatch());
  state.rounds.sf  = Array.from({length:2},()=>mkMatch());
  state.rounds.final = [mkMatch()];
  state.rounds.third = [mkMatch()];
  state.champion=null; state.runnerUp=null; state.thirdPlace=null;
  document.getElementById('championTrophy').classList.remove('visible');
}
 
function evalRound(round){
  state.rounds[round].forEach(m=>{
    m.winner=null;
    if(m.scoreA!==''&&m.scoreB!==''){
      const a=Number(m.scoreA),b=Number(m.scoreB);
      if(a!==b){m.winner=a>b?m.teamA:m.teamB;}
      return;
    }
    if(m.outcome==='A') m.winner=m.teamA;
    else if(m.outcome==='B') m.winner=m.teamB;
  });
}
 
function propagate(from,to){
  const src=state.rounds[from];
  state.rounds[to].forEach((m,i)=>{
    const left=src[i*2], right=src[i*2+1];
    const newA=left?.winner||'TBD', newB=right?.winner||'TBD';
    if(m.teamA!==newA||m.teamB!==newB){
      m.teamA=newA; m.teamB=newB;
      m.scoreA=''; m.scoreB=''; m.outcome=''; m.winner=null;
    }
  });
}
 
function propagateFinals(){
  const [sf1,sf2]=state.rounds.sf;
  const f=state.rounds.final[0];
  const newA=sf1.winner||'TBD', newB=sf2.winner||'TBD';
  if(f.teamA!==newA||f.teamB!==newB){
    f.teamA=newA; f.teamB=newB; f.scoreA=''; f.scoreB=''; f.outcome=''; f.winner=null;
  }
  const t=state.rounds.third[0];
  const loser1=sf1.winner?(sf1.teamA===sf1.winner?sf1.teamB:sf1.teamA):'TBD';
  const loser2=sf2.winner?(sf2.teamA===sf2.winner?sf2.teamB:sf2.teamA):'TBD';
  if(t.teamA!==loser1||t.teamB!==loser2){
    t.teamA=loser1; t.teamB=loser2; t.scoreA=''; t.scoreB=''; t.outcome=''; t.winner=null;
  }
}
 
function assignChampion(){
  const f=state.rounds.final[0];
  const t=state.rounds.third[0];
  state.champion=null; state.runnerUp=null; state.thirdPlace=null;
  if(f.scoreA!==''&&f.scoreB!==''){
    const a=Number(f.scoreA),b=Number(f.scoreB);
    if(a!==b){
      f.winner=a>b?f.teamA:f.teamB;
      state.champion=f.winner;
      state.runnerUp=f.winner===f.teamA?f.teamB:f.teamA;
    }
  } else if(f.outcome==='A'){ state.champion=f.teamA; state.runnerUp=f.teamB; f.winner=f.teamA; }
  else if(f.outcome==='B'){ state.champion=f.teamB; state.runnerUp=f.teamA; f.winner=f.teamB; }
  if(state.champion) document.getElementById('championTrophy').classList.add('visible');
  if(t.scoreA!==''&&t.scoreB!==''){
    const a=Number(t.scoreA),b=Number(t.scoreB);
    if(a!==b) t.winner=a>b?t.teamA:t.teamB;
  } else if(t.outcome==='A') t.winner=t.teamA;
  else if(t.outcome==='B') t.winner=t.teamB;
  state.thirdPlace=t.winner||null;
}
 
/* ── Bracket Render ── */
// Layout: left-to-right tree
// R32 (16 matches) → R16 (8) → QF (4) → SF (2) → Final (1)
// Each pair of matches feeds one match in the next round.
// Matches are grouped: top 8 R32 feed top half of bracket, bottom 8 feed bottom half.
 
/* ── Team Name Shortcuts ── */
const TEAM_SHORTCUTS = {
  'Bosnia & Herzegovina': 'BiH',
  'South Africa': 'RSA',
  'South Korea': 'KOR',
  'Côte d\'Ivoire': 'CIV',
  'Saudi Arabia': 'KSA',
  'United Arab Emirates': 'UAE',
  'Trinidad & Tobago': 'T&T',
  'New Zealand': 'NZL',
  'DR Congo': 'COD'
};

function koFlag(name){
  const url=flagUrl(name);
  if(!url||name==='TBD') return '<span class="fp"></span>';
  return `<img src="${url}" alt="" loading="lazy" onerror="this.style.opacity=0">`;
}
function shortName(name){
  if(!name||name==='TBD') return name||'TBD';
  if(TEAM_SHORTCUTS[name]) return TEAM_SHORTCUTS[name];
  if(name.length<=9) return name;
  const parts = name.split(/\s+/);
  if(parts.length===1) return name.slice(0,6).toUpperCase();
  const abbr = parts.map(p=>p[0]).join('').toUpperCase();
  return abbr.length<=4 ? abbr : abbr.slice(0,3);
}
 
function buildKoCard(m, round, matchIdx, isThird=false, isFinal=false){
  const el=document.createElement('div');
  el.className='ko-card'+(m.winner?' won':'')+(isFinal?' final-card':'');
  const aWins=m.winner===m.teamA, bWins=m.winner===m.teamB;
  const hasTBD=m.teamA==='TBD'||m.teamB==='TBD';
  const lbl=isThird?'🥉 3rd Place':isFinal?'🏆 Final':(m.label||`M${matchIdx+1}`);
  el.innerHTML=`
    <div class="ko-card-head">
      <span>${esc(lbl)}</span>
      <span class="ko-dot${m.winner?' live':''}"></span>
    </div>
    <div class="ko-team${aWins?' winner':bWins?' loser':''}">
      <div class="tl">${koFlag(m.teamA)}<span class="tn">${esc(m.teamA)}</span></div>
      <input class="sc" type="number" min="0" inputmode="numeric"
        data-round="${round}" data-match="${matchIdx}" data-side="A"
        value="${m.scoreA}" ${hasTBD?'disabled':''}>
    </div>
    <div class="ko-sep"></div>
    <div class="ko-team${bWins?' winner':aWins?' loser':''}">
      <div class="tl">${koFlag(m.teamB)}<span class="tn">${esc(m.teamB)}</span></div>
      <input class="sc" type="number" min="0" inputmode="numeric"
        data-round="${round}" data-match="${matchIdx}" data-side="B"
        value="${m.scoreB}" ${hasTBD?'disabled':''}>
    </div>
    <div class="ko-btns">
      <button type="button" class="${m.outcome==='A'?'selA':''}"
        data-round="${round}" data-match="${matchIdx}" data-outcome="A">${esc(shortName(m.teamA))}</button>
      <button type="button" class="${m.outcome==='D'?'selD':''}"
        data-round="${round}" data-match="${matchIdx}" data-outcome="D">Draw</button>
      <button type="button" class="${m.outcome==='B'?'selB':''}"
        data-round="${round}" data-match="${matchIdx}" data-outcome="B">${esc(shortName(m.teamB))}</button>
    </div>`;
  el.querySelectorAll('.sc').forEach(inp=>inp.addEventListener('input',onKoScore));
  el.querySelectorAll('.ko-btns button').forEach(btn=>btn.addEventListener('click',onKoOutcome));
  return el;
}
 
function renderBracket(){
  const stage=document.getElementById('bracketStage');
  stage.innerHTML='';
 
  // Card dimensions
  const CW=172, CH=90, GAP_Y=16, COL_GAP=36;

  // We'll build using an HTML canvas approach with absolute positioning inside a relative container.
  // Total matches per round: 16, 8, 4, 2, 1
  // Total height = 16 matches * (CH + GAP_Y) - GAP_Y
  const ROUNDS = [
    {key:'r32', count:16, label:'Round of 32'},
    {key:'r16', count:8,  label:'Round of 16'},
    {key:'qf',  count:4,  label:'Quarterfinals'},
    {key:'sf',  count:2,  label:'Semifinals'},
    {key:'final',count:1, label:'Final'},
  ];

  const totalH = 16*(CH+GAP_Y)-GAP_Y+20;
  const totalW = ROUNDS.length*(CW+COL_GAP)-COL_GAP + 140;// +120 for trophy area
 
  // Build container
  const wrap=document.createElement('div');
  wrap.style.cssText=`position:relative;width:${totalW}px;height:${totalH+60}px;margin-top:8px;`;
 
  // SVG for connector lines
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',totalW);
  svg.setAttribute('height',totalH+60);
  svg.style.cssText='position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';
  wrap.appendChild(svg);
 
  // Round labels
  const labelRow=document.createElement('div');
  labelRow.style.cssText=`position:absolute;top:-28px;left:0;width:${totalW}px;height:24px;`;
  ROUNDS.forEach((r,ri)=>{
    const lbl=document.createElement('div');
    const x=ri*(CW+COL_GAP);
    lbl.style.cssText=`position:absolute;left:${x}px;width:${CW}px;text-align:center;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${r.key==='final'?'var(--amber)':'var(--green)'};`;
    lbl.textContent=r.label;
    labelRow.appendChild(lbl);
  });
  wrap.appendChild(labelRow);
 
  // Position tracking: matchCY[round][matchIdx] = center Y of that card
  const matchPos={};
  ROUNDS.forEach(r=>{ matchPos[r.key]={}; });
 
  // Place all round cards
  ROUNDS.forEach((r,ri)=>{
    const x=ri*(CW+COL_GAP);
    const n=r.count;
    // Space matches evenly across totalH
    const slotH=totalH/n;
    const matches=state.rounds[r.key]||[];
 
    for(let i=0;i<n;i++){
      const cy=slotH*i+slotH/2;
      const y=cy-CH/2;
      matchPos[r.key][i]={x, y, cy};
 
      const m=matches[i]||mkMatch();
      const isFinal=(r.key==='final');
      const card=buildKoCard(m, r.key, i, false, isFinal);
      card.style.cssText=`position:absolute;left:${x}px;top:${y}px;width:${CW}px;`;
      wrap.appendChild(card);
    }
  });
 
  // Trophy above final
  {
    const fp=matchPos.final[0];
    if(fp){
      const trophy=document.createElement('div');
      trophy.style.cssText=`position:absolute;left:${fp.x}px;top:${fp.y-60}px;width:${CW}px;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;`;
      trophy.innerHTML=`<div style="font-size:28px">🏆</div>
        <div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--amber)">Champion</div>
        ${state.champion?`<div style="font-size:11px;font-weight:600;color:var(--green);text-align:center">${esc(state.champion)}</div>`:''}`;
      wrap.appendChild(trophy);
    }
  }
 
  // 3rd place match — below the final, after the SF column
  {
    const sfPos=matchPos.sf;
    const thirdX=3*(CW+COL_GAP); // same X as SF
    const thirdY=totalH+4; // below everything
    const thirdM=state.rounds.third[0]||mkMatch();
    const thirdCard=buildKoCard(thirdM,'third',0,true,false);
    thirdCard.style.cssText=`position:absolute;left:${thirdX}px;top:${thirdY}px;width:${CW}px;`;
    wrap.appendChild(thirdCard);
 
    // label above
    const tl=document.createElement('div');
    tl.style.cssText=`position:absolute;left:${thirdX}px;top:${thirdY-18}px;width:${CW}px;text-align:center;font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;`;
    tl.textContent='3rd Place Match';
    wrap.appendChild(tl);
  }
 
  // Connector lines
  const lineColor='rgba(255,255,255,0.15)';
  const winColor='rgba(0,232,122,0.55)';
 
  function drawConnector(x1,cy1,x2,cy2,won){
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx=x1+(x2-x1)*0.5;
    path.setAttribute('d',`M${x1},${cy1} H${mx} V${cy2} H${x2}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',won?winColor:lineColor);
    path.setAttribute('stroke-width','2');
    path.setAttribute('stroke-linecap','round');
    path.setAttribute('stroke-linejoin','round');
    svg.appendChild(path);
  }
 
  // Draw connectors between rounds
  const roundKeys=['r32','r16','qf','sf','final'];
  for(let ri=0;ri<roundKeys.length-1;ri++){
    const fromKey=roundKeys[ri];
    const toKey=roundKeys[ri+1];
    const toCount=ROUNDS[ri+1].count;
    const fromMatches=state.rounds[fromKey]||[];
    const toMatches=state.rounds[toKey]||[];
 
    for(let ti=0;ti<toCount;ti++){
      const srcA_idx=ti*2, srcB_idx=ti*2+1;
      const fromA=matchPos[fromKey][srcA_idx];
      const fromB=matchPos[fromKey][srcB_idx];
      const toP=matchPos[toKey][ti];
      if(!fromA||!fromB||!toP) continue;
 
      const mA=fromMatches[srcA_idx];
      const mB=fromMatches[srcB_idx];
      const toMatch=toMatches[ti];
 
      const wonA=mA&&mA.winner&&toMatch&&mA.winner===toMatch.teamA;
      const wonB=mB&&mB.winner&&toMatch&&mB.winner===toMatch.teamB;
 
      // fromA right edge → toP left edge
      drawConnector(fromA.x+CW, fromA.cy, toP.x, toP.cy, wonA);
      // fromB right edge → toP left edge (slightly offset for visual)
      drawConnector(fromB.x+CW, fromB.cy, toP.x, toP.cy, wonB);
    }
  }
 
  // SF → 3rd place connectors
  {
    const sf0=matchPos.sf[0], sf1=matchPos.sf[1];
    const thirdX=3*(CW+COL_GAP);
    const thirdCY=totalH+4+CH/2;
    if(sf0) drawConnector(sf0.x+CW,sf0.cy,thirdX,thirdCY,false);
    if(sf1) drawConnector(sf1.x+CW,sf1.cy,thirdX,thirdCY,false);
  }
 
  const outerWrap=document.createElement('div');
  outerWrap.style.cssText='position:relative;padding-top:32px;';
  outerWrap.appendChild(wrap);
  stage.appendChild(outerWrap);
}
 
function onKoScore(e){
  const{round,match,side}=e.target.dataset;
  const val=e.target.value===''?'':Math.max(0,Math.floor(Number(e.target.value)));
  state.rounds[round][Number(match)][side==='A'?'scoreA':'scoreB']=val;
  onKoChange(round);
}
function onKoOutcome(e){
  const{round,match,outcome}=e.target.dataset;
  const m=state.rounds[round][Number(match)];
  m.outcome=m.outcome===outcome?'':outcome;
  onKoChange(round);
}
function onKoChange(round){
  evalRound(round);
  if(round==='r32') { propagate('r32','r16'); propagate('r16','qf'); propagate('qf','sf'); propagateFinals(); }
  else if(round==='r16') { propagate('r16','qf'); propagate('qf','sf'); propagateFinals(); }
  else if(round==='qf')  { propagate('qf','sf'); propagateFinals(); }
  else if(round==='sf')  { propagateFinals(); }
  if(round==='final'||round==='third'||round==='sf') assignChampion();
  renderBracket();
  renderResults();
}
 
function renderResults(){
  const panel=document.getElementById('resultsPanel');
  if(state.champion){
    panel.innerHTML=`
      <div class="champion-reveal">
        <div class="champion-trophy">🏆</div>
        <div class="champion-name">${esc(state.champion)}</div>
        <div class="champion-sub">World Cup Simulator Champion</div>
        <div class="podium-grid">
          <div class="podium-item"><div class="podium-medal">🥇</div><div class="podium-team">${esc(state.champion)}</div><div class="podium-label">Champion</div></div>
          <div class="podium-item"><div class="podium-medal">🥈</div><div class="podium-team">${esc(state.runnerUp||'TBD')}</div><div class="podium-label">Runner-up</div></div>
          <div class="podium-item"><div class="podium-medal">🥉</div><div class="podium-team">${esc(state.thirdPlace||'TBD')}</div><div class="podium-label">3rd Place</div></div>
        </div>
      </div>`;
  } else {
    panel.innerHTML=`<div class="pending-msg"><h2>Champion pending</h2><p>Complete the bracket to reveal the winner.</p></div>`;
  }
}
 
function attachTabs(){
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('visible'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('visible');
    });
  });
}
 
function init(){
  Object.keys(state.groups).forEach(g=>{
    state.groupMatches[g]=MATCH_PAIRS.map(([a,b])=>mkGroupMatch(a,b));
    state.fairPlay[g]={};
    state.groups[g].forEach(t=>{ state.fairPlay[g][t]=0; });
    state.matchesVisible[g]=false;
  });
  state.rounds.r32=Array.from({length:16},()=>mkMatch());
  state.rounds.r16=Array.from({length:8},()=>mkMatch());
  state.rounds.qf =Array.from({length:4},()=>mkMatch());
  state.rounds.sf =Array.from({length:2},()=>mkMatch());
  state.rounds.final=[mkMatch()];
  state.rounds.third=[mkMatch()];
 
  renderGroups();
  populateR32();
  renderBracket();
  renderResults();
  attachTabs();
 
  document.getElementById('btnShowAll').addEventListener('click',()=>setAllMatches(true));
  document.getElementById('btnHideAll').addEventListener('click',()=>setAllMatches(false));
}
 
init();
</script>
