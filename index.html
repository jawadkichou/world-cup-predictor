<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>World Cup Bracket Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #171a21;
      --surface3: #1e2230;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #e4eaf5;
      --muted: #6b7a94;
      --muted2: #8e9ab5;
      --green: #00e87a;
      --green-dim: rgba(0,232,122,0.12);
      --green-glow: rgba(0,232,122,0.06);
      --blue: #4da6ff;
      --blue-dim: rgba(77,166,255,0.12);
      --red: #ff5568;
      --red-dim: rgba(255,85,104,0.12);
      --amber: #ffb84d;
      --r: 10px;
      --r-lg: 16px;
      --r-xl: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app { max-width: 1320px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── Header ── */
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .brand { display: flex; align-items: center; gap: 16px; }

    .brand-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: grid; place-items: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(18px, 2.4vw, 26px);
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }

    .brand-text p { color: var(--muted2); font-size: 13px; margin-top: 2px; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
    }

    .tab {
      padding: 9px 20px;
      border-radius: 8px;
      background: transparent;
      color: var(--muted2);
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      transition: all 160ms ease;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text); background: var(--surface2); }

    .tab.active {
      background: var(--surface3);
      color: #fff;
      border: 1px solid var(--border2);
    }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.visible { display: block; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .section-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .section-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(0,232,122,0.2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Groups Grid ── */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 16px;
    }
    @media(max-width:1100px){ .groups-grid { grid-template-columns: repeat(2,minmax(0,1fr)); } }
    @media(max-width:680px){ .groups-grid { grid-template-columns: 1fr; } }

    /* ── Group Card ── */
    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      transition: border-color 200ms ease;
    }

    .group-card:hover { border-color: var(--border2); }

    .group-card-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .group-card-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .group-card-header span { font-size: 12px; color: var(--muted); }

    /* ── Standings Table ── */
    .standings-wrap { padding: 0 6px; }

    table.standings {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }

    table.standings th {
      color: var(--muted);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 10px 6px 6px;
      text-align: center;
    }

    table.standings th:first-child { text-align: left; padding-left: 8px; }

    table.standings td {
      padding: 7px 6px;
      text-align: center;
      color: var(--muted2);
      font-variant-numeric: tabular-nums;
    }

    table.standings td:first-child { text-align: left; padding-left: 8px; }

    table.standings tbody tr {
      border-radius: 8px;
      transition: background 120ms ease;
      cursor: grab;
    }

    table.standings tbody tr:active { cursor: grabbing; }
    table.standings tbody tr:hover { background: var(--surface2); }

    .qualified td { color: var(--text); }
    .qualified td:first-child { font-weight: 500; }
    .eliminated td { opacity: 0.5; }

    .q-indicator {
      display: inline-block;
      width: 3px;
      height: 14px;
      border-radius: 2px;
      margin-right: 6px;
      vertical-align: middle;
    }

    .q-1 .q-indicator { background: var(--green); }
    .q-2 .q-indicator { background: var(--blue); }

    tr.dragging { opacity: 0.4; }
    tr.drag-over { outline: 1px dashed var(--green); outline-offset: -1px; }

    .team-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .team-flag {
      width: 28px;
      height: 20px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid var(--border2);
      flex-shrink: 0;
      display: block;
      background: var(--surface3);
    }
    .flag-placeholder {
      width: 28px; height: 20px;
      border-radius: 4px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      display: block;
      flex-shrink: 0;
    }

    .team-text { font-weight: 500; color: var(--text); font-size: 13px; }

    .fp-input {
      width: 44px;
      padding: 3px 4px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      text-align: center;
      font-size: 12px;
      font-family: inherit;
    }

    .fp-input:focus { outline: 1px solid var(--blue); border-color: var(--blue); }

    /* ── Manual note ── */
    .manual-note {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 6px 12px 8px;
      font-size: 11.5px;
      color: var(--muted);
    }

    .manual-clear {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
      cursor: pointer;
      font-size: 11px;
      font-family: inherit;
      transition: all 150ms ease;
    }

    .manual-clear:hover { background: var(--surface3); color: var(--text); }

    /* ── Matches ── */
    .matches-list { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px 12px; }

    .match-row {
      display: grid;
      grid-template-rows: auto auto;
      gap: 0;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 150ms ease;
    }

    .match-row:hover { border-color: var(--border2); }

    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 9px 10px 7px;
    }

    .match-team-b { text-align: right; justify-content: flex-end; }

    .score-block {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-input {
      width: 36px;
      padding: 5px 2px;
      text-align: center;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface3);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      transition: border-color 150ms ease;
    }

    .score-input:focus { outline: none; border-color: var(--blue); }

    .score-sep {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }

    .result-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 20px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .pill-w { background: var(--green-dim); color: var(--green); }
    .pill-d { background: var(--blue-dim); color: var(--blue); }
    .pill-l { background: var(--red-dim); color: var(--red); }

    /* ── Outcome Buttons ── */
    .outcome-buttons {
      display: flex;
      gap: 0;
      border-top: 1px solid var(--border);
    }

    .outcome-buttons button {
      flex: 1;
      padding: 7px 4px;
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 500;
      font-family: inherit;
      transition: all 150ms ease;
    }

    .outcome-buttons button:last-child { border-right: none; }
    .outcome-buttons button:hover { background: var(--surface3); color: var(--text); }

    .outcome-buttons button.selected-A { background: var(--green-dim); color: var(--green); }
    .outcome-buttons button.selected-D { background: var(--blue-dim); color: var(--blue); }
    .outcome-buttons button.selected-B { background: var(--red-dim); color: var(--red); }

    /* ── Best Thirds ── */
    .best-third-section {
      margin-top: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
    }

    .best-third-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .best-third-header h3 {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
    }

    .best-thirds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .third-item {
      background: var(--surface);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .third-item-rank {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .third-item-rank.qualifies { color: var(--amber); }

    .third-item-team { font-size: 13px; font-weight: 500; color: var(--text); }

    .third-item-stats {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      gap: 10px;
    }

    .third-item-stats span { display: flex; align-items: center; gap: 3px; }

    /* ── Bracket ── */
    .bracket-scroll { overflow-x: auto; padding-bottom: 8px; }

    .bracket-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(280px, 1fr));
      gap: 16px;
      min-width: 900px;
    }

    .round-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .round-label {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 2px 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }

    .knockout-match {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: border-color 160ms ease;
    }

    .knockout-match:hover { border-color: var(--border2); }

    .ko-match-number {
      padding: 7px 12px 5px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .ko-teams {
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ko-team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .ko-team-row .team-label { flex: 1; min-width: 0; }
    .ko-team-row .team-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .ko-score-input {
      width: 34px;
      padding: 4px 2px;
      text-align: center;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }

    .ko-score-input:focus { outline: none; border-color: var(--blue); }

    .ko-team-row.winner .team-text { color: var(--green); }
    .ko-team-row.loser { opacity: 0.45; }

    .ko-divider {
      height: 1px;
      background: var(--border);
      margin: 0 12px;
    }

    .ko-status {
      padding: 6px 12px 9px;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .ko-status.has-winner { color: var(--green); }

    /* ── Finals Column ── */
    .finals-badges {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .finals-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--amber);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 12px 5px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Results ── */
    .results-panel {
      display: grid;
      place-items: center;
      min-height: 240px;
      text-align: center;
    }

    .champion-reveal {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 40px;
    }

    .champion-trophy { font-size: 56px; line-height: 1; }

    .champion-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(24px, 5vw, 42px);
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .champion-sub { color: var(--muted2); font-size: 14px; }

    .pending-msg { color: var(--muted2); }
    .pending-msg h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── Trophy FAB ── */
    .trophy-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--green);
      color: #000;
      display: grid; place-items: center;
      font-size: 26px;
      box-shadow: 0 8px 32px rgba(0,232,122,0.3);
      transform: scale(0) rotate(-20deg);
      opacity: 0;
      transition: transform 280ms cubic-bezier(.34,1.56,.64,1), opacity 280ms ease;
      pointer-events: none;
      z-index: 100;
    }

    .trophy-fab.visible { transform: scale(1) rotate(0deg); opacity: 1; }

    /* ── Utils ── */
    .hidden { display: none !important; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-icon">⚽</div>
      <div class="brand-text">
        <h1>Bracket Simulator</h1>
        <p>World Cup-style groups &amp; knockout stage</p>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="groups" type="button">Groups</button>
      <button class="tab" data-tab="bracket" type="button">Bracket</button>
      <button class="tab" data-tab="results" type="button">Results</button>
    </nav>
  </header>

  <div id="groups" class="panel visible">
    <div class="section-header">
      <h2>Group Stage</h2>
      <span class="section-badge">12 Groups</span>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
    <div class="best-third-section" id="bestThirdSection">
      <div class="best-third-header">
        <h3>Best Third-Place Teams</h3>
        <span class="section-badge">Top 8 advance</span>
      </div>
      <div class="best-thirds-grid" id="bestThirdsGrid"></div>
    </div>
  </div>

  <div id="bracket" class="panel">
    <div class="section-header">
      <h2>Knockout Stage</h2>
      <span class="section-badge">48 Teams</span>
    </div>
    <div class="bracket-scroll">
      <div class="bracket-grid" id="bracketGrid"></div>
    </div>
  </div>

  <div id="results" class="panel">
    <div class="section-header"><h2>Results</h2></div>
    <div class="results-panel" id="resultsPanel"></div>
  </div>

</div>

<div class="trophy-fab" id="championTrophy">🏆</div>

<script>
/* ── Flag image lookup: team name → ISO 3166-1 alpha-2 (or subdivision) code ── */
const FLAG_CODES = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Czechia':'cz',
  'Canada':'ca','Bosnia & Herzegovina':'ba','Qatar':'qa','Switzerland':'ch',
  'Brazil':'br','Morocco':'ma','Haiti':'ht','Scotland':'gb-sct',
  'USA':'us','Paraguay':'py','Australia':'au','Turkey':'tr',
  'Germany':'de','Curaçao':'cw','Côte d\'Ivoire':'ci','Ecuador':'ec',
  'Netherlands':'nl','Japan':'jp','Sweden':'se','Tunisia':'tn',
  'Belgium':'be','Egypt':'eg','Iran':'ir','New Zealand':'nz',
  'Spain':'es','Cape Verde':'cv','Saudi Arabia':'sa','Uruguay':'uy',
  'France':'fr','Senegal':'sn','Iraq':'iq','Norway':'no',
  'Argentina':'ar','Algeria':'dz','Austria':'at','Jordan':'jo',
  'Portugal':'pt','DR Congo':'cd','Uzbekistan':'uz','Colombia':'co',
  'England':'gb-eng','Croatia':'hr','Ghana':'gh','Panama':'pa'
};

function flagUrl(name) {
  const code = FLAG_CODES[name];
  if (!code) return null;
  return `https://flagcdn.com/w40/${code}.png`;
}

/* ── State ── */
const state = {
  groups: {
    'Group A': ['Mexico','South Africa','South Korea','Czechia'],
    'Group B': ['Canada','Bosnia & Herzegovina','Qatar','Switzerland'],
    'Group C': ['Brazil','Morocco','Haiti','Scotland'],
    'Group D': ['USA','Paraguay','Australia','Turkey'],
    'Group E': ['Germany','Curaçao',"Côte d'Ivoire",'Ecuador'],
    'Group F': ['Netherlands','Japan','Sweden','Tunisia'],
    'Group G': ['Belgium','Egypt','Iran','New Zealand'],
    'Group H': ['Spain','Cape Verde','Saudi Arabia','Uruguay'],
    'Group I': ['France','Senegal','Iraq','Norway'],
    'Group J': ['Argentina','Algeria','Austria','Jordan'],
    'Group K': ['Portugal','DR Congo','Uzbekistan','Colombia'],
    'Group L': ['England','Croatia','Ghana','Panama']
  },
  fairPlay: {},
  groupMatches: {},
  manualRanking: {},
  rounds: { r32: [], r16: [], qf: [], sf: [], final: [], third: [] },
  champion: null
};

const MATCH_PAIRS = [[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];

/* ── Helpers ── */
function esc(t) {
  return String(t).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseTeam(team) {
  return { name: team, flag: '' };
}

function teamFlagImg(name) {
  const url = flagUrl(name);
  if (!url) return '<span class="team-flag flag-placeholder"></span>';
  return `<img class="team-flag" src="${url}" alt="${esc(name)} flag" loading="lazy" onerror="this.style.opacity=0">`;
}

function teamLabelHtml(team) {
  return `<span class="team-label">${teamFlagImg(team)}<span class="team-text">${esc(team)}</span></span>`;
}

function teamLabelEl(team) {
  const el = document.createElement('span');
  el.className = 'team-label';
  el.innerHTML = teamLabelHtml(team);
  return el;
}

function groupKey(g) { return g.replace(/\W+/g,'-'); }
function mkMatch() { return { teamA:'TBD', teamB:'TBD', scoreA:'', scoreB:'', outcome:'', winner:null }; }
function mkGroupMatch(a,b) { return { a, b, scoreA:'', scoreB:'', outcome:'' }; }

/* ── Standings Engine ── */
function computeStandings(groupName) {
  const teams = state.groups[groupName];
  const stats = teams.map((team, i) => ({
    team, MP:0, W:0, D:0, L:0, GF:0, GA:0, GD:0, Pts:0,
    fairPlay: Number(state.fairPlay[groupName][i] || 0)
  }));
  const manual = state.manualRanking[groupName];
  const useManual = Array.isArray(manual) && manual.length === teams.length;

  state.groupMatches[groupName].forEach(m => {
    let sA = m.scoreA === '' ? null : Number(m.scoreA);
    let sB = m.scoreB === '' ? null : Number(m.scoreB);
    const a = stats[m.a], b = stats[m.b];
    if (sA === null || sB === null) {
      if (m.outcome === 'A') { sA=1; sB=0; }
      else if (m.outcome === 'B') { sA=0; sB=1; }
      else if (m.outcome === 'D') { sA=0; sB=0; }
      else return;
    }
    a.MP++; b.MP++;
    a.GF+=sA; a.GA+=sB; b.GF+=sB; b.GA+=sA;
    if (sA>sB){ a.W++; b.L++; a.Pts+=3; }
    else if (sA<sB){ b.W++; a.L++; b.Pts+=3; }
    else { a.D++; b.D++; a.Pts++; b.Pts++; }
  });
  stats.forEach(s => s.GD = s.GF - s.GA);

  if (useManual) return manual.map(t => stats.find(s => s.team===t) || { team:t, MP:0,W:0,D:0,L:0,GF:0,GA:0,GD:0,Pts:0,fairPlay:0 });

  stats.sort(cmpStandings);
  const out = [];
  let tied = [stats[0]];
  for (let i=1; i<stats.length; i++) {
    const prev = stats[i-1], cur = stats[i];
    if (prev.Pts===cur.Pts && prev.GD===cur.GD && prev.GF===cur.GF) { tied.push(cur); }
    else { out.push(...(tied.length>1 ? resolveH2H(tied, groupName) : tied)); tied=[cur]; }
  }
  out.push(...(tied.length>1 ? resolveH2H(tied, groupName) : tied));
  return out;
}

function cmpStandings(a,b) {
  if (b.Pts!==a.Pts) return b.Pts-a.Pts;
  if (b.GD!==a.GD) return b.GD-a.GD;
  if (b.GF!==a.GF) return b.GF-a.GF;
  if (a.fairPlay!==b.fairPlay) return a.fairPlay-b.fairPlay;
  return a.team.localeCompare(b.team);
}

function resolveH2H(tied, groupName) {
  const idxs = tied.map(t => state.groups[groupName].indexOf(t.team));
  const h = tied.map(t => ({ team:t.team, Pts:0, GF:0, GA:0, GD:0, fairPlay:t.fairPlay }));
  state.groupMatches[groupName].forEach(m => {
    const ai = idxs.indexOf(m.a), bi = idxs.indexOf(m.b);
    if (ai===-1||bi===-1) return;
    const sA = Number(m.scoreA||0), sB = Number(m.scoreB||0);
    h[ai].GF+=sA; h[ai].GA+=sB; h[bi].GF+=sB; h[bi].GA+=sA;
    if (sA>sB) h[ai].Pts+=3; else if (sA<sB) h[bi].Pts+=3; else { h[ai].Pts++; h[bi].Pts++; }
  });
  h.forEach(s => s.GD=s.GF-s.GA);
  h.sort(cmpStandings);
  return h;
}

function computeBestThirds() {
  return Object.keys(state.groups).map(g => {
    const s = computeStandings(g)[2] || { team:'TBD', Pts:0, GD:0, GF:0 };
    return { group:g, team:s.team, Pts:s.Pts, GD:s.GD, GF:s.GF };
  }).sort((a,b) => b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF || a.team.localeCompare(b.team));
}

/* ── Render Groups ── */
function renderGroups() {
  const container = document.getElementById('groupsGrid');
  container.innerHTML = '';
  Object.entries(state.groups).forEach(([gName, teams]) => {
    const card = document.createElement('article');
    card.className = 'group-card';
    card.innerHTML = `
      <div class="group-card-header">
        <h2>${gName}</h2>
        <span>${teams.length} teams · 6 matches</span>
      </div>
      <div class="standings-wrap">
        <table class="standings" aria-label="Standings for ${gName}">
          <thead><tr><th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th><th>FP</th></tr></thead>
          <tbody id="tbody-${groupKey(gName)}"></tbody>
        </table>
      </div>
      <div class="manual-note" id="note-${groupKey(gName)}"></div>
      <div class="matches-list" id="matches-${groupKey(gName)}"></div>
    `;
    container.appendChild(card);
    renderStandings(gName);
    renderGroupMatches(gName);
  });
  renderBestThirds();
}

function renderStandings(gName) {
  const tbody = document.getElementById(`tbody-${groupKey(gName)}`);
  const note  = document.getElementById(`note-${groupKey(gName)}`);
  if (!tbody) return;
  const standings = computeStandings(gName);
  const manual = state.manualRanking[gName];
  const useManual = Array.isArray(manual) && manual.length === standings.length;
  tbody.innerHTML = '';

  note.innerHTML = useManual
    ? `Manual order active &mdash; drag rows to reorder <button class="manual-clear" data-group="${gName}" type="button">Reset</button>`
    : `Drag rows to override ranking for this group`;

  standings.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.draggable = true;
    tr.dataset.team = row.team;
    tr.dataset.group = gName;
    if (i===0) tr.classList.add('qualified','q-1');
    else if (i===1) tr.classList.add('qualified','q-2');
    else tr.classList.add('eliminated');
    tr.innerHTML = `
      <td><span class="q-indicator"></span>${teamLabelHtml(row.team)}</td>
      <td>${row.MP}</td><td>${row.W}</td><td>${row.D}</td><td>${row.L}</td>
      <td>${row.GF}</td><td>${row.GA}</td><td>${row.GD}</td>
      <td style="font-weight:600;color:var(--text)">${row.Pts}</td>
      <td><input class="fp-input" type="number" min="0" value="${row.fairPlay}"
           data-group="${gName}" data-team="${row.team}"
           aria-label="Fair play for ${row.team}"></td>
    `;
    tbody.appendChild(tr);
    tr.addEventListener('dragstart', onDragStart);
    tr.addEventListener('dragover',  onDragOver);
    tr.addEventListener('dragleave', onDragLeave);
    tr.addEventListener('drop',      onDrop);
    tr.addEventListener('dragend',   onDragEnd);
  });

  tbody.querySelectorAll('.fp-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const g = e.target.dataset.group, t = e.target.dataset.team;
      const idx = state.groups[g].indexOf(t);
      if (idx>=0) { state.fairPlay[g][idx] = Math.max(0, Math.floor(Number(e.target.value)||0)); }
      refreshAll(g);
    });
  });

  note.querySelectorAll('.manual-clear').forEach(btn => {
    btn.addEventListener('click', e => {
      delete state.manualRanking[e.target.dataset.group];
      refreshAll(e.target.dataset.group);
    });
  });
}

function renderBestThirds() {
  const grid = document.getElementById('bestThirdsGrid');
  if (!grid) return;
  const list = computeBestThirds();
  grid.innerHTML = list.map((item, i) => `
    <div class="third-item">
      <div class="third-item-rank${i<8?' qualifies':''}">${i<8?`#${i+1} Qualifies`:`#${i+1}`}</div>
      <div class="third-item-team">${item.team}</div>
      <div class="third-item-stats">
        <span>Pts ${item.Pts}</span>
        <span>GD ${item.GD>=0?'+':''}${item.GD}</span>
        <span>GF ${item.GF}</span>
      </div>
    </div>
  `).join('');
}

function renderGroupMatches(gName) {
  const container = document.getElementById(`matches-${groupKey(gName)}`);
  if (!container) return;
  container.innerHTML = '';
  const teams = state.groups[gName];
  const matches = state.groupMatches[gName];

  matches.forEach((m, idx) => {
    const hasScore = m.scoreA!=='' || m.scoreB!=='';
    const sA = hasScore ? Number(m.scoreA||0) : (m.outcome==='A'?1:m.outcome==='B'?0:0);
    const sB = hasScore ? Number(m.scoreB||0) : (m.outcome==='A'?0:m.outcome==='B'?1:0);
    const pillCls = hasScore
      ? (sA>sB?'pill-w':sA<sB?'pill-l':'pill-d')
      : (m.outcome==='A'?'pill-w':m.outcome==='B'?'pill-l':m.outcome==='D'?'pill-d':'');
    const pillLbl = hasScore
      ? (sA>sB?'W':sA<sB?'L':'D')
      : (m.outcome==='A'?'W':m.outcome==='B'?'L':m.outcome==='D'?'D':'vs');

    const row = document.createElement('div');
    row.className = 'match-row';
    row.innerHTML = `
      <div class="match-teams">
        <div>${teamLabelHtml(teams[m.a])}</div>
        <div class="score-block">
          <input class="score-input" type="number" min="0" inputmode="numeric"
            data-group="${gName}" data-match="${idx}" data-side="A" value="${m.scoreA}"
            aria-label="${teams[m.a]} score">
          <span class="result-pill ${pillCls}">${pillLbl}</span>
          <input class="score-input" type="number" min="0" inputmode="numeric"
            data-group="${gName}" data-match="${idx}" data-side="B" value="${m.scoreB}"
            aria-label="${teams[m.b]} score">
        </div>
        <div style="text-align:right">${teamLabelHtml(teams[m.b])}</div>
      </div>
      <div class="outcome-buttons">
        <button type="button" class="${m.outcome==='A'?'selected-A':''}"
          data-group="${gName}" data-match="${idx}" data-outcome="A">Win ${parseTeam(teams[m.a]).name}</button>
        <button type="button" class="${m.outcome==='D'?'selected-D':''}"
          data-group="${gName}" data-match="${idx}" data-outcome="D">Draw</button>
        <button type="button" class="${m.outcome==='B'?'selected-B':''}"
          data-group="${gName}" data-match="${idx}" data-outcome="B">Win ${parseTeam(teams[m.b]).name}</button>
      </div>
    `;
    container.appendChild(row);
  });

  container.querySelectorAll('.score-input').forEach(inp => inp.addEventListener('input', onGroupScore));
  container.querySelectorAll('.outcome-buttons button').forEach(btn => btn.addEventListener('click', onGroupOutcome));
}

/* ── Group Event Handlers ── */
function onGroupScore(e) {
  const { group, match, side } = e.target.dataset;
  const val = e.target.value==='' ? '' : Math.max(0, Math.floor(Number(e.target.value)));
  state.groupMatches[group][Number(match)][side==='A'?'scoreA':'scoreB'] = val;
  refreshAll(group);
}

function onGroupOutcome(e) {
  const { group, match, outcome } = e.target.dataset;
  const m = state.groupMatches[group][Number(match)];
  m.outcome = m.outcome===outcome ? '' : outcome;
  refreshAll(group);
}

function refreshAll(group) {
  renderStandings(group);
  renderGroupMatches(group);
  renderBestThirds();
  populateR32();
  renderBracket();
  renderResults();
}

/* ── Drag & Drop ── */
let dragTeam = null, dragGroup = null;

function onDragStart(e) {
  dragTeam  = e.currentTarget.dataset.team;
  dragGroup = e.currentTarget.dataset.group;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragTeam);
  e.currentTarget.classList.add('dragging');
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function onDrop(e) {
  e.preventDefault();
  const src = dragTeam;
  const tgt = e.currentTarget.dataset.team;
  const grp = e.currentTarget.dataset.group;
  if (!src || src===tgt || grp!==dragGroup) return;
  const order = (Array.isArray(state.manualRanking[grp]) && state.manualRanking[grp].length===state.groups[grp].length)
    ? [...state.manualRanking[grp]] : [...state.groups[grp]];
  const fi = order.indexOf(src), ti = order.indexOf(tgt);
  if (fi<0||ti<0) return;
  order.splice(fi,1); order.splice(ti,0,src);
  state.manualRanking[grp] = order;
  refreshAll(grp);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('tr.drag-over').forEach(r => r.classList.remove('drag-over'));
}

/* ── Knockout Logic ── */
function populateR32() {
  const thirds = computeBestThirds().slice(0,8);
  const thirdMap = Object.fromEntries(thirds.map(t => [t.group.replace('Group ',''), t.team]));
  const w = g => computeStandings(`Group ${g}`)[0]?.team || 'TBD';
  const r = g => computeStandings(`Group ${g}`)[1]?.team || 'TBD';

  const thirdSlots = [
    { winner:'A', third:'B' }, { winner:'B', third:'C' }, { winner:'D', third:'E' }, { winner:'E', third:'F' },
    { winner:'G', third:'H' }, { winner:'I', third:'J' }, { winner:'K', third:'L' }, { winner:'L', third:'A' }
  ];

  state.rounds.r32 = [];
  thirdSlots.forEach(p => state.rounds.r32.push({
    teamA: w(p.winner), teamB: thirdMap[p.third] || `3rd(${p.third})`,
    scoreA:'', scoreB:'', outcome:'', winner:null
  }));

  [['C','F'],['F','C'],['H','J'],['J','H']].forEach(([a,b]) =>
    state.rounds.r32.push({ teamA:w(a), teamB:r(b), scoreA:'', scoreB:'', outcome:'', winner:null }));

  [['A','D'],['B','G'],['E','I'],['K','L']].forEach(([a,b]) =>
    state.rounds.r32.push({ teamA:r(a), teamB:r(b), scoreA:'', scoreB:'', outcome:'', winner:null }));

  state.rounds.r16  = Array.from({length:8},  mkMatch);
  state.rounds.qf   = Array.from({length:4},  mkMatch);
  state.rounds.sf   = Array.from({length:2},  mkMatch);
  state.rounds.final= [mkMatch()];
  state.rounds.third= [mkMatch()];
  state.champion = null;
  document.getElementById('championTrophy').classList.remove('visible');
}

function evalRound(round) {
  state.rounds[round].forEach(m => {
    m.winner = null;
    if (m.scoreA!=='' && m.scoreB!=='') {
      const a=Number(m.scoreA), b=Number(m.scoreB);
      if (a!==b) m.winner = a>b ? m.teamA : m.teamB;
      return;
    }
    if (m.outcome==='A') m.winner = m.teamA;
    else if (m.outcome==='B') m.winner = m.teamB;
  });
}

function propagate(from, to, pairsOf2=true) {
  const src = state.rounds[from];
  state.rounds[to].forEach((m, i) => {
    if (pairsOf2) {
      const left = src[i*2], right = src[i*2+1];
      m.teamA = left?.winner  || left?.teamA  || 'TBD';
      m.teamB = right?.winner || right?.teamB || 'TBD';
    }
    m.scoreA=''; m.scoreB=''; m.outcome=''; m.winner=null;
  });
}

function propagateFinals() {
  const [sf1, sf2] = state.rounds.sf;
  const f = state.rounds.final[0];
  f.teamA = sf1.winner || sf1.teamA || 'TBD';
  f.teamB = sf2.winner || sf2.teamA || 'TBD';
  f.scoreA=''; f.scoreB=''; f.outcome=''; f.winner=null;

  const t = state.rounds.third[0];
  t.teamA = (!sf1.winner ? sf1.teamB : sf1.teamA===sf1.winner ? sf1.teamB : sf1.teamA) || 'TBD';
  t.teamB = (!sf2.winner ? sf2.teamB : sf2.teamA===sf2.winner ? sf2.teamB : sf2.teamA) || 'TBD';
  t.scoreA=''; t.scoreB=''; t.outcome=''; t.winner=null;
}

function assignChampion() {
  const f = state.rounds.final[0];
  state.champion = null;
  if (f.scoreA!=='' && f.scoreB!=='') {
    const a=Number(f.scoreA), b=Number(f.scoreB);
    if (a!==b) {
      f.winner = a>b ? f.teamA : f.teamB;
      state.champion = f.winner;
      document.getElementById('championTrophy').classList.add('visible');
    }
  }
}

/* ── Bracket Render ── */
function renderBracket() {
  const grid = document.getElementById('bracketGrid');
  grid.innerHTML = '';
  renderRoundCol('Round of 32', 'r32', grid);
  renderRoundCol('Round of 16', 'r16', grid);
  renderRoundCol('Quarterfinals', 'qf', grid);
  renderFinalsCol(grid);
  attachBracketEvents();
}

function renderRoundCol(label, round, root) {
  const col = document.createElement('div');
  col.className = 'round-col';
  col.innerHTML = `<div class="round-label">${label}</div>`;
  state.rounds[round].forEach((m, idx) => {
    col.appendChild(buildKoMatch(m, round, idx));
  });
  root.appendChild(col);
}

function buildKoMatch(m, round, idx) {
  const el = document.createElement('div');
  el.className = 'knockout-match';
  const aWins = m.winner === m.teamA;
  const bWins = m.winner === m.teamB;
  const statusTxt = koStatus(m);
  const hasTBD = m.teamA==='TBD'||m.teamB==='TBD';

  el.innerHTML = `
    <div class="ko-match-number">Match ${idx+1}</div>
    <div class="ko-teams">
      <div class="ko-team-row${aWins?' winner':bWins?' loser':''}">
        ${teamLabelHtml(m.teamA)}
        <input class="ko-score-input" type="number" min="0" inputmode="numeric"
          data-round="${round}" data-match="${idx}" data-side="A" value="${m.scoreA}"
          ${hasTBD?'disabled':''}>
      </div>
      <div class="ko-divider"></div>
      <div class="ko-team-row${bWins?' winner':aWins?' loser':''}">
        ${teamLabelHtml(m.teamB)}
        <input class="ko-score-input" type="number" min="0" inputmode="numeric"
          data-round="${round}" data-match="${idx}" data-side="B" value="${m.scoreB}"
          ${hasTBD?'disabled':''}>
      </div>
    </div>
    <div class="outcome-buttons">
      <button type="button" class="${m.outcome==='A'?'selected-A':''}"
        data-round="${round}" data-match="${idx}" data-outcome="A">${parseTeam(m.teamA).name||'Win A'}</button>
      <button type="button" class="${m.outcome==='D'?'selected-D':''}"
        data-round="${round}" data-match="${idx}" data-outcome="D">Draw</button>
      <button type="button" class="${m.outcome==='B'?'selected-B':''}"
        data-round="${round}" data-match="${idx}" data-outcome="B">${parseTeam(m.teamB).name||'Win B'}</button>
    </div>
    <div class="ko-status${m.winner?' has-winner':''}">${statusTxt}</div>
  `;
  return el;
}

function renderFinalsCol(root) {
  const col = document.createElement('div');
  col.className = 'round-col';
  col.innerHTML = `<div class="round-label">Final Stage</div>`;

  const sfLabel = document.createElement('div');
  sfLabel.innerHTML = `<div class="finals-label">Semifinals</div>`;
  col.appendChild(sfLabel);
  state.rounds.sf.forEach((m, i) => col.appendChild(buildKoMatch(m, 'sf', i)));

  const finLabel = document.createElement('div');
  finLabel.innerHTML = `<div class="finals-label" style="margin-top:12px">🏆 Final</div>`;
  col.appendChild(finLabel);
  col.appendChild(buildKoMatch(state.rounds.final[0], 'final', 0));

  const thirdLabel = document.createElement('div');
  thirdLabel.innerHTML = `<div class="finals-label" style="margin-top:12px">🥉 3rd Place</div>`;
  col.appendChild(thirdLabel);
  col.appendChild(buildKoMatch(state.rounds.third[0], 'third', 0));

  root.appendChild(col);
}

function koStatus(m) {
  if (m.teamA==='TBD'||m.teamB==='TBD') return 'Waiting for qualifiers';
  if (m.winner) return `Winner: ${m.winner}`;
  if (m.outcome==='D') return 'Draw — no knockout winner yet';
  if (m.scoreA!==''&&m.scoreB!==''&&Number(m.scoreA)===Number(m.scoreB)) return 'Scores level — pending';
  return 'Enter scores or pick a result';
}

function attachBracketEvents() {
  document.querySelectorAll('#bracketGrid .ko-score-input').forEach(inp => inp.addEventListener('input', onKoScore));
  document.querySelectorAll('#bracketGrid .outcome-buttons button').forEach(btn => btn.addEventListener('click', onKoOutcome));
}

function onKoScore(e) {
  const { round, match, side } = e.target.dataset;
  const val = e.target.value==='' ? '' : Math.max(0, Math.floor(Number(e.target.value)));
  state.rounds[round][Number(match)][side==='A'?'scoreA':'scoreB'] = val;
  onKoChange(round);
}

function onKoOutcome(e) {
  const { round, match, outcome } = e.target.dataset;
  const m = state.rounds[round][Number(match)];
  m.outcome = m.outcome===outcome ? '' : outcome;
  onKoChange(round);
}

function onKoChange(round) {
  evalRound(round);
  if (round==='r32') propagate('r32','r16');
  if (round==='r16') propagate('r16','qf');
  if (round==='qf')  propagate('qf','sf');
  if (round==='sf')  propagateFinals();
  if (round==='final') assignChampion();
  renderBracket();
  renderResults();
}

/* ── Results ── */
function renderResults() {
  const panel = document.getElementById('resultsPanel');
  if (state.champion) {
    panel.innerHTML = `
      <div class="champion-reveal">
        <div class="champion-trophy">🏆</div>
        <div class="champion-name">${esc(state.champion)}</div>
        <div class="champion-sub">World Cup Simulator Champion — adjust bracket results to change the outcome</div>
      </div>
    `;
  } else {
    panel.innerHTML = `
      <div class="pending-msg">
        <h2>Champion pending</h2>
        <p>Advance teams through the bracket and complete the final to reveal the winner.</p>
      </div>
    `;
  }
}

/* ── Tabs ── */
function attachTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab).classList.add('visible');
    });
  });
}

/* ── Init ── */
function init() {
  Object.keys(state.groups).forEach(g => {
    state.groupMatches[g] = MATCH_PAIRS.map(([a,b]) => mkGroupMatch(a,b));
    state.fairPlay[g] = [0,0,0,0];
  });
  state.rounds.r32   = Array.from({length:16}, mkMatch);
  state.rounds.r16   = Array.from({length:8},  mkMatch);
  state.rounds.qf    = Array.from({length:4},  mkMatch);
  state.rounds.sf    = Array.from({length:2},  mkMatch);
  state.rounds.final = [mkMatch()];
  state.rounds.third = [mkMatch()];

  renderGroups();
  populateR32();
  renderBracket();
  renderResults();
  attachTabs();
}

init();
</script>
